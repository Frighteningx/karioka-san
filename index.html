<style>
    .hand-container { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; justify-content: center; }
    .card-virtual {
        width: 50px; height: 75px; background: white; border-radius: 6px;
        color: #1e293b; display: flex; flex-direction: column; align-items: center;
        justify-content: center; font-weight: bold; border: 2px solid #cbd5e1;
        cursor: pointer; transition: 0.2s; position: relative;
    }
    .card-virtual:hover { transform: translateY(-10px); border-color: var(--accent); }
    .card-virtual.red { color: #f43f5e; }
    .card-virtual.selected { border: 3px solid var(--accent); box-shadow: 0 0 15px var(--accent); }
    
    .table-center { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
    .deck-pile { width: 60px; height: 90px; background: #334155; border: 2px dashed var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--accent); text-align: center; cursor: pointer; }
    .discard-pile { width: 60px; height: 90px; background: white; border: 2px solid #cbd5e1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #1e293b; }
</style>

<div id="onlineGameArea" style="display:none; border-top: 1px solid var(--border); margin-top: 20px; padding-top: 20px;">
    <h2 style="font-size: 0.8rem; color: var(--accent);">MESA DE CARTAS ONLINE</h2>
    
    <div class="table-center">
        <div class="deck-pile" onclick="ejecutarAccion('robar_mazo')">MAZO<br>(Robar)</div>
        <div id="pozoDisplay" class="discard-pile">--</div>
    </div>

    <p style="font-size: 0.7rem; color: var(--text-dim); text-align: center;">Tu Mano:</p>
    <div id="myHand" class="hand-container"></div>
    
    <div id="gameActions" style="margin-top: 20px; display: none;">
        <button onclick="ejecutarAccion('descartar')" style="background: var(--danger); width: 100%;">DESCARTAR CARTA SELECCIONADA</button>
    </div>
</div>

<script>
    let miMano = [];
    let cartaSeleccionada = null;
    let miNombreOnline = ""; // Debes pedir el nombre al entrar a la sala

    // Esta función debe llamarse dentro del syncOnline()
    function updateGameUI(state) {
        // Actualizar Pozo
        const pozoEl = document.getElementById('pozoDisplay');
        pozoEl.innerText = state.pozo[0];
        pozoEl.className = (state.pozo[0].includes('♥') || state.pozo[0].includes('♦')) ? 'discard-pile red' : 'discard-pile';

        // Actualizar Mi Mano
        miMano = state.manos[miNombreOnline] || [];
        const handEl = document.getElementById('myHand');
        handEl.innerHTML = '';
        
        miMano.forEach(c => {
            const div = document.createElement('div');
            const isRed = c.includes('♥') || c.includes('♦');
            div.className = `card-virtual ${isRed ? 'red' : ''} ${cartaSeleccionada === c ? 'selected' : ''}`;
            div.innerText = c;
            div.onclick = () => {
                cartaSeleccionada = c;
                document.getElementById('gameActions').style.display = (state.fase === 'descartar' && state.jugadores[state.turnoIdx] === miNombreOnline) ? 'block' : 'none';
                updateGameUI(state); // Refrescar para mostrar selección
            };
            handEl.appendChild(div);
        });

        // Mostrar u ocultar zona de juego
        document.getElementById('onlineGameArea').style.display = 'block';
    }

    async function ejecutarAccion(tipo) {
        if(modo !== 'online') return;
        showLoader(true);
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                accion: "accion_juego",
                salaId: salaId,
                tipo: tipo,
                usuario: miNombreOnline,
                carta: cartaSeleccionada
            })
        });
        cartaSeleccionada = null;
        await syncOnline();
        showLoader(false);
    }
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • Dark Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
            --border: rgba(255,255,255,0.08);
        }

        body {
            margin: 0; padding: 10px; background-color: var(--bg); color: var(--text);
            font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column;
            gap: 20px; padding-bottom: 80px;
        }

        .container { max-width: 800px; margin: 0 auto; width: 100%; }

        h1 {
            font-size: 2rem; text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 30px 0;
        }

        .card {
            background: var(--card); border-radius: 20px; padding: 24px;
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border); margin-bottom: 24px;
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { font-size: 1rem; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        input {
            background: #0f172a; border: 1px solid #334155; color: white;
            padding: 14px; border-radius: 10px; width: 100%; font-size: 1rem; outline: none;
        }

        button {
            background: var(--accent); color: var(--bg); border: none;
            padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        /* --- EMOJI PICKER --- */
        .player-form-row { display: flex; gap: 12px; align-items: center; position: relative; }
        .emoji-trigger {
            background: #334155; min-width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; border-radius: 10px; cursor: pointer; border: 1px solid var(--border);
        }
        .emoji-window {
            position: absolute; bottom: 60px; left: 0;
            background: var(--card); border: 1px solid var(--accent);
            border-radius: 15px; padding: 15px; display: none;
            grid-template-columns: repeat(5, 1fr); gap: 10px;
            z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-height: 250px; overflow-y: auto;
        }
        .emoji-option { font-size: 1.5rem; padding: 8px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .emoji-option:hover { background: var(--accent-glow); }

        /* --- TABLA --- */
        .table-wrapper { overflow-x: auto; border-radius: 12px; background: #0f172a; padding: 10px; }
        .karioka-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .karioka-table th { padding: 15px 10px; font-size: 0.75rem; color: var(--text-dim); border-bottom: 2px solid #334155; }
        .ronda-name { text-align: left; font-size: 0.85rem; color: var(--text); }
        .score-input { width: 60px !important; text-align: center; padding: 6px !important; background: #1e293b !important; color: white; border: 1px solid #334155; }
        .total-row { font-weight: 800; color: var(--accent); font-size: 1.2rem; }

        /* --- DESPLEGABLE HISTORIAL --- */
        details summary {
            padding: 15px; background: var(--card); border-radius: 12px;
            cursor: pointer; font-weight: bold; color: var(--accent);
            list-style: none; border: 1px solid var(--border);
        }
        details[open] summary { border-radius: 12px 12px 0 0; }
        .history-content { background: #161e2e; padding: 15px; border-radius: 0 0 12px 12px; border: 1px solid var(--border); border-top: none; }
        .history-item { border-bottom: 1px solid #2d3748; padding: 10px 0; font-size: 0.85rem; }
        .history-item:last-child { border: none; }

        .loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .player-chip { display: inline-flex; align-items: center; gap: 8px; background: #1e293b; padding: 8px 15px; border-radius: 20px; cursor: pointer; border: 1px solid #334155; font-size: 0.9rem; }
        .player-chip.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
    </style>
</head>
<body>

<div id="globalLoader" class="loader">
    <div style="text-align:center;">
        <div style="border: 4px solid var(--accent); border-top: 4px solid transparent; width: 45px; height: 45px; border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto;"></div>
        <p style="margin-top:15px;">Sincronizando datos...</p>
    </div>
</div>

<div class="container">
    <h1>Karioka Pro</h1>

    <div class="card">
        <div class="header-row">
            <h2>Partida en Vivo</h2>
            <button onclick="finalizarJuego()" style="background: var(--success); color: white;">Finalizar</button>
        </div>
        <div id="chipsContainer" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
        
        <div id="gameZone" style="display:none; margin-top:20px;">
            <div class="table-wrapper">
                <table class="karioka-table">
                    <thead><tr id="tableHeader"></tr></thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot><tr id="tableFooter" class="total-row"></tr></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header-row">
            <h2 id="playerActionTitle">Gestión de Jugadores</h2>
            <button id="cancelEditBtn" style="display:none; background: var(--danger); color: white;" onclick="resetPlayerForm()">X</button>
        </div>
        <div class="player-form-row">
            <div class="emoji-trigger" id="currentEmoji" onclick="toggleEmojiWindow()">👤</div>
            <div class="emoji-window" id="emojiWindow">
                <div class="emoji-option" onclick="selectEmoji('👤')">👤</div><div class="emoji-option" onclick="selectEmoji('🤴')">🤴</div>
                <div class="emoji-option" onclick="selectEmoji('🥷')">🥷</div><div class="emoji-option" onclick="selectEmoji('🤡')">🤡</div>
                <div class="emoji-option" onclick="selectEmoji('👽')">👽</div><div class="emoji-option" onclick="selectEmoji('🤖')">🤖</div>
                <div class="emoji-option" onclick="selectEmoji('🦁')">🦁</div><div class="emoji-option" onclick="selectEmoji('🐯')">🐯</div>
                <div class="emoji-option" onclick="selectEmoji('🦊')">🦊</div><div class="emoji-option" onclick="selectEmoji('🐶')">🐶</div>
                <div class="emoji-option" onclick="selectEmoji('🐭')">🐭</div><div class="emoji-option" onclick="selectEmoji('🐸')">🐸</div>
                <div class="emoji-option" onclick="selectEmoji('🐙')">🐙</div><div class="emoji-option" onclick="selectEmoji('🦄')">🦄</div>
                <div class="emoji-option" onclick="selectEmoji('🐲')">🐲</div><div class="emoji-option" onclick="selectEmoji('🌸')">🌸</div>
                <div class="emoji-option" onclick="selectEmoji('🌻')">🌻</div><div class="emoji-option" onclick="selectEmoji('🌴')">🌴</div>
                <div class="emoji-option" onclick="selectEmoji('🔥')">🔥</div><div class="emoji-option" onclick="selectEmoji('🍀')">🍀</div>
                <div class="emoji-option" onclick="selectEmoji('🌮')">🌮</div><div class="emoji-option" onclick="selectEmoji('🍕')">🍕</div>
                <div class="emoji-option" onclick="selectEmoji('💎')">💎</div>
            </div>
            <input type="text" id="playerName" placeholder="Nombre...">
            <button id="playerMainBtn" onclick="savePlayer()">Añadir</button>
        </div>
        <div id="registeredPlayersList" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:20px;"></div>
    </div>

    <div class="card">
        <h2>Ranking Global</h2>
        <div style="height: 300px;"><canvas id="statsChart"></canvas></div>
    </div>

    <details>
        <summary>Ver Historial de Partidas Anteriores</summary>
        <div class="history-content" id="historyList">
            <p style="color: var(--text-dim); text-align: center;">No hay partidas registradas.</p>
        </div>
    </details>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];
    
    let jugadores = [];
    let historial = [];
    let seleccionados = [];
    let currentEmoji = '👤';
    let editingOldName = null;
    let chart = null;
    let fechaInicioPartida = null;

    window.onload = loadData;

    function toggleEmojiWindow() {
        const win = document.getElementById('emojiWindow');
        win.style.display = (win.style.display === 'grid') ? 'none' : 'grid';
    }

    function selectEmoji(e) {
        currentEmoji = e;
        document.getElementById('currentEmoji').innerText = e;
        document.getElementById('emojiWindow').style.display = 'none';
    }

    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            jugadores = data.jugadores;
            historial = data.historial;
            renderPlayers();
            renderStats();
            renderHistory();
        } catch (e) { alert("Error de conexión"); }
        showLoader(false);
    }

    function renderPlayers() {
        const chips = document.getElementById('chipsContainer');
        const list = document.getElementById('registeredPlayersList');
        chips.innerHTML = ''; list.innerHTML = '';

        jugadores.forEach(j => {
            const chip = document.createElement('div');
            chip.className = `player-chip ${seleccionados.includes(j.nombre) ? 'active' : ''}`;
            chip.innerHTML = j.nombre;
            chip.onclick = () => togglePlayer(j.nombre);
            chips.appendChild(chip);

            const item = document.createElement('div');
            item.className = 'player-chip';
            item.innerHTML = `${j.nombre} <span onclick="startEdit('${j.nombre}')" style="margin-left:8px; opacity:0.5; cursor:pointer;">✏️</span>`;
            list.appendChild(item);
        });
        updateGameTable();
    }

    function togglePlayer(name) {
        if (seleccionados.includes(name)) {
            seleccionados = seleccionados.filter(n => n !== name);
        } else {
            if (seleccionados.length === 0) fechaInicioPartida = new Date().toLocaleString();
            seleccionados.push(name);
        }
        renderPlayers();
    }

    function updateGameTable() {
        const zone = document.getElementById('gameZone');
        if (seleccionados.length === 0) { zone.style.display = 'none'; return; }
        zone.style.display = 'block';

        document.getElementById('tableHeader').innerHTML = '<th>Ronda</th>' + seleccionados.map(n => `<th>${n.split(' ')[1] || n}</th>`).join('');
        document.getElementById('tableBody').innerHTML = RONDAS.map(r => `<tr><td class="ronda-name">${r}</td>${seleccionados.map(n => `<td><input type="number" class="score-input" data-player="${n}" oninput="calcTotal()"></td>`).join('')}</tr>`).join('');
        document.getElementById('tableFooter').innerHTML = '<td>TOTAL</td>' + seleccionados.map(n => `<td id="total_${n}">0</td>`).join('');
    }

    function calcTotal() {
        seleccionados.forEach(n => {
            let t = 0;
            document.querySelectorAll(`.score-input[data-player="${n}"]`).forEach(i => t += (parseInt(i.value) || 0));
            document.getElementById(`total_${n}`).innerText = t;
        });
    }

    async function savePlayer() {
        const name = document.getElementById('playerName').value.trim();
        if(!name) return;
        showLoader(true);
        const full = currentEmoji + " " + name;
        const payload = editingOldName ? { accion: "editar_jugador", nombreViejo: editingOldName, nombreNuevo: full } : { accion: "nuevo_jugador", nombre: full };
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        resetPlayerForm();
        await loadData();
    }

    async function finalizarJuego() {
        if(seleccionados.length < 2) return;
        let res = seleccionados.map(n => ({ nombre: n, score: parseInt(document.getElementById(`total_${n}`).innerText) })).sort((a,b) => a.score - b.score);
        if(!confirm(`Ganador: ${res[0].nombre}. ¿Guardar resultados?`)) return;

        showLoader(true);
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                accion: "guardar_juego",
                fechaInicio: fechaInicioPartida,
                fechaFin: new Date().toLocaleString(),
                ganador: res[0].nombre,
                perdedores: res.slice(1).map(r => r.nombre),
                puntajeGanador: res[0].score
            })
        });
        seleccionados = [];
        await loadData();
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        if (historial.length === 0) return;
        container.innerHTML = historial.map(h => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; color: var(--success);">
                    <strong>🏆 ${h.ganador}</strong>
                    <span>${h.puntaje} pts</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size: 0.7rem; color: var(--text-dim); margin: 4px 0;">
                    <span>🕒 Duración: <b>${h.duracion}</b></span>
                    <span>${h.fin.split(',')[0]}</span>
                </div>
                <div style="font-size: 0.75rem; opacity: 0.8;">Perdedores: ${h.perdedores}</div>
            </div>
        `).join('');
    }

    function renderStats() {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: jugadores.map(j => j.nombre),
                datasets: [
                    { label: 'Ganados', data: jugadores.map(j => j.ganados), backgroundColor: '#10b981' },
                    { label: 'Perdidos', data: jugadores.map(j => j.perdidos), backgroundColor: '#f43f5e' }
                ]
            },
            options: { maintainAspectRatio: false, scales: { y: { stacked: true }, x: { stacked: true } } }
        });
    }

    function startEdit(n) { 
        editingOldName = n; 
        document.getElementById('playerName').value = n.split(' ')[1] || n; 
        document.getElementById('playerActionTitle').innerText = "Editando...";
        document.getElementById('cancelEditBtn').style.display = "block";
    }

    function resetPlayerForm() { 
        editingOldName = null; 
        document.getElementById('playerName').value = ""; 
        document.getElementById('playerActionTitle').innerText = "Gestión de Jugadores";
        document.getElementById('cancelEditBtn').style.display = "none";
    }

    function showLoader(s) { document.getElementById('globalLoader').style.display = s ? 'flex' : 'none'; }
</script>
</body>
</html>

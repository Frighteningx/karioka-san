<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • v11 Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #22c55e; --sky: #38bdf8; --text: #f8fafc; --danger: #ef4444; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Modos */
        .tabs { display: flex; background: #0b1120; padding: 4px; border-radius: 12px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; background: transparent; color: #94a3b8; font-size: 0.75rem; }
        .tab-btn.active { background: var(--accent); color: #000; }

        /* Mesa Karioka */
        .mesa { background: radial-gradient(circle, #1e3a8a 0%, #020617 100%); border-radius: 40px; padding: 25px; border: 1px solid var(--sky); position: relative; margin: 15px 0; }
        .turn-box { background: var(--sky); color: #000; padding: 4px 15px; border-radius: 20px; font-weight: 800; font-size: 0.7rem; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px var(--sky); }
        
        .card-slot { width: 65px; height: 95px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .deck { background: #1e293b; border: 2px dashed var(--sky); color: var(--sky); font-size: 0.65rem; text-align: center; }
        .discard { background: #fff; color: #000; font-size: 1.4rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .red { color: var(--danger) !important; }

        .hand { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-top: 15px; min-height: 80px; }
        .card-v { width: 42px; height: 60px; background: #fff; color: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.75rem; cursor: pointer; border: 2px solid transparent; }
        .card-v.sel { transform: translateY(-15px); border-color: var(--sky); box-shadow: 0 10px 20px var(--sky); }

        /* General */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn-sky { background: var(--sky); color: #000; }
        .btn-success { background: var(--accent); color: #000; }
        .chip { display: inline-block; padding: 7px 15px; background: #1e293b; border-radius: 20px; margin: 4px; font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; }
        .chip.active { border-color: var(--sky); background: rgba(56, 189, 248, 0.1); color: var(--sky); }
        .score-in { width: 45px; background: #020617; border: 1px solid #334155; color: #fff; text-align: center; border-radius: 5px; padding: 5px; font-size: 0.8rem; }
        
        #syncNotif { position: fixed; top: 10px; right: 10px; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; display: none; }
        .emoji-pop { position: absolute; background: var(--card); border: 1px solid var(--sky); border-radius: 20px; padding: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 1000; bottom: 70px; }
    </style>
</head>
<body>

<div id="syncNotif"></div>
<div id="loading" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:10000; display:none; justify-content:center; align-items:center;"><p>Sincronizando mesa...</p></div>

<div class="container">
    <h1 style="color: var(--sky); font-size: 1.2rem; margin: 10px 0;">Karioka PRO Engine</h1>

    <div class="tabs">
        <button onclick="setM('fisico')" id="tF" class="tab-btn active">MODO KPI (FÍSICO)</button>
        <button onclick="setM('online')" id="tO" class="tab-btn">MODO LIVE (ONLINE)</button>
    </div>

    <div id="areaO" style="display:none;">
        <div id="loginO" class="card">
            <input type="text" id="salaId" placeholder="Código de Sala" style="width:100%; padding:12px; background:#020617; border:1px solid #334155; color:#fff; border-radius:10px; margin-bottom:10px; outline:none;">
            <button class="btn btn-sky" onclick="unirseSala()">Unirse a Partida</button>
            <div id="whoAmI" style="display:none; margin-top:15px;">
                <p style="font-size:0.7rem; color:var(--sky);">¿Quién eres tú en esta mesa?</p>
                <div id="playerOptions"></div>
            </div>
        </div>

        <div id="gameO" style="display:none;">
            <div id="logO" style="font-size:0.6rem; color:var(--sky); text-align:center; margin-bottom:5px; font-style:italic;">Conectado</div>
            <div class="mesa">
                <div id="turnO" class="turn-box">TURNO: --</div>
                <div style="display:flex; justify-content:center; gap:30px;">
                    <div class="card-slot deck" onclick="play('robar_mazo')">MAZO<br>ROBAR</div>
                    <div id="pozoCard" class="card-slot discard" onclick="play('robar_pozo')">--</div>
                </div>
                <div id="myHand" class="hand"></div>
            </div>
            <button id="btnTirar" class="btn btn-success" style="display:none;" onclick="play('tirar')">TIRAR CARTA SELECCIONADA</button>
            <button class="btn" style="background:#334155; color:#fff;" onclick="location.reload()">Cerrar Sala</button>
        </div>
    </div>

    <div id="areaF" class="card">
        <h2 style="font-size:0.7rem; color:var(--accent); margin-top:0; letter-spacing:1px;">REGISTRO DE KPIs</h2>
        <div id="chipsF"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-sky" id="btnStartF" onclick="startF()">Iniciar Partida</button>
            <button class="btn btn-sky" style="background:var(--card); color:var(--sky); border:1px solid var(--sky);" onclick="crearSalaOnline()">Crear Sala Online</button>
        </div>
        
        <div id="zonaT" style="display:none; margin-top:20px; overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse; font-size:0.75rem; text-align:center;">
                <thead id="hT"></thead>
                <tbody id="bT"></tbody>
                <tfoot id="fT" style="font-weight:bold; color:var(--sky);"></tfoot>
            </table>
        </div>
    </div>

    <div class="card" style="position:relative;">
        <h2 style="font-size:0.7rem; color:var(--sky); margin-top:0;">PERFILES</h2>
        <div style="display:flex; gap:10px;">
            <div id="eBtn" onclick="tE()" style="background:#1e293b; padding:10px; border-radius:10px; cursor:pointer; font-size:1.4rem;">👤</div>
            <input type="text" id="nameIn" placeholder="Nombre..." style="flex:1; background:#020617; border:1px solid #334155; color:#fff; padding:10px; border-radius:10px;">
            <button onclick="addP()" style="width:50px; background:var(--sky); color:#000;">+</button>
        </div>
        <div id="ePop" class="emoji-pop">
            <div onclick="setE('👤')">👤</div><div onclick="setE('🦁')">🦁</div><div onclick="setE('🥷')">🥷</div><div onclick="setE('🤖')">🤖</div><div onclick="setE('🦄')">🦄</div>
            <div onclick="setE('🔥')">🔥</div><div onclick="setE('💎')">💎</div><div onclick="setE('🦊')">🦊</div><div onclick="setE('🐯')">🐯</div><div onclick="setE('🍀')">🍀</div>
        </div>
        <div id="listP" style="margin-top:10px; opacity:0.6;"></div>
    </div>

    <details class="card">
        <summary style="cursor:pointer; font-size:0.8rem; font-weight:bold; color:var(--accent);">VER HISTORIAL Y GRÁFICOS</summary>
        <div style="height:180px; margin-top:10px;"><canvas id="chart"></canvas></div>
        <div id="hist" style="margin-top:15px;"></div>
    </details>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Tríos 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];
    
    let db = { jugadores: [], seleccionados: [], activo: false, ts: null, modo: 'fisico', emoji: '👤' };
    let room = { id: null, me: null, selC: null, poll: null };

    window.onload = load;

    async function load() {
        const r = await fetch(API);
        const d = await r.json();
        db.jugadores = d.jugadores;
        renderChips();
        renderHist(d.historial);
    }

    function renderChips() {
        const c = document.getElementById('chipsF');
        c.innerHTML = '';
        db.jugadores.forEach(j => {
            const d = document.createElement('div');
            d.className = `chip ${db.seleccionados.includes(j.nombre) ? 'active' : ''}`;
            d.innerHTML = j.nombre;
            d.onclick = () => {
                if(db.activo) return;
                if(db.seleccionados.includes(j.nombre)) db.seleccionados = db.seleccionados.filter(x => x !== j.nombre);
                else db.seleccionados.push(j.nombre);
                renderChips();
            };
            c.appendChild(d);
        });
    }

    function setM(m) {
        db.modo = m;
        document.getElementById('tF').classList.toggle('active', m==='fisico');
        document.getElementById('tO').classList.toggle('active', m==='online');
        document.getElementById('areaF').style.display = m==='fisico'?'block':'none';
        document.getElementById('areaO').style.display = m==='online'?'block':'none';
    }

    async function unirseSala() {
        const id = document.getElementById('salaId').value;
        if(!id) return;
        document.getElementById('loading').style.display='flex';
        const r = await fetch(`${API}?salaId=${id}`);
        const d = await r.json();
        if(d.error) { alert("Sala no existe"); document.getElementById('loading').style.display='none'; return; }
        
        room.id = id;
        document.getElementById('whoAmI').style.display='block';
        const opt = document.getElementById('playerOptions');
        opt.innerHTML = '';
        d.game.jugadores.forEach(p => {
            const b = document.createElement('button');
            b.className = 'btn'; b.style.background = '#1e293b'; b.style.color='#fff';
            b.innerText = p;
            b.onclick = () => { room.me = p; iniciarSesionOnline(); };
            opt.appendChild(b);
        });
        document.getElementById('loading').style.display='none';
    }

    function iniciarSesionOnline() {
        document.getElementById('loginO').style.display='none';
        document.getElementById('gameO').style.display='block';
        room.poll = setInterval(sync, 4000);
        sync();
    }

    async function sync() {
        document.getElementById('syncNotif').style.display='block';
        const r = await fetch(`${API}?salaId=${room.id}`);
        const d = await r.json();
        const g = d.game;
        const miT = g.jugadores[g.turno] === room.me;
        
        document.getElementById('turnO').innerText = `TURNO: ${g.jugadores[g.turno]} ${miT?'(TUYO)':''}`;
        document.getElementById('logO').innerText = g.log;
        document.getElementById('pCard').innerText = g.pozo[0];
        document.getElementById('pCard').className = (g.pozo[0].includes('♥')||g.pozo[0].includes('♦'))?'card-slot discard red':'card-slot discard';
        
        const h = document.getElementById('myHand');
        h.innerHTML = '';
        (g.manos[room.me] || []).forEach(c => {
            const v = document.createElement('div');
            v.className = `card-v ${room.selC===c?'sel':''} ${(c.includes('♥')||c.includes('♦'))?'red':''}`;
            v.innerText = c;
            v.onclick = () => { if(miT && g.fase==='tirar'){ room.selC=c; sync(); }};
            h.appendChild(v);
        });
        document.getElementById('btnTirar').style.display = (miT && g.fase==='tirar' && room.selC)?'block':'none';
        setTimeout(()=>document.getElementById('syncNotif').style.display='none', 400);
    }

    async function play(tipo) {
        document.getElementById('loading').style.display='flex';
        await fetch(API, { method:'POST', body: JSON.stringify({ accion:"accion_juego", salaId: room.id, tipo, user: room.me, carta: room.selC }), headers:{"Content-Type":"text/plain"} });
        room.selC = null;
        await sync();
        document.getElementById('loading').style.display='none';
    }

    // FISICO
    function startF() {
        if(db.seleccionados.length < 2) return alert("Selecciona jugadores.");
        db.activo = true; db.ts = Date.now();
        document.getElementById('btnStartF').innerText = "Finalizar y Guardar";
        document.getElementById('btnStartF').className = "btn btn-success";
        document.getElementById('zonaT').style.display = 'block';
        document.getElementById('hT').innerHTML = `<tr><th>Fase</th>${db.seleccionados.map(p => `<th>${p.split(' ')[1]||p}</th>`).join('')}</tr>`;
        document.getElementById('bT').innerHTML = RONDAS.map(r => `<tr><td style="text-align:left;">${r}</td>${db.seleccionados.map(p => `<td><input type="number" class="score-in" data-p="${p}" oninput="calcF()"></td>`).join('')}</tr>`).join('');
        document.getElementById('fT').innerHTML = `<tr><td>TOTAL</td>${db.seleccionados.map(p => `<td id="tot_${p}">0</td>`).join('')}</tr>`;
    }

    function calcF() {
        db.seleccionados.forEach(p => {
            let t = 0;
            document.querySelectorAll(`[data-p="${p}"]`).forEach(i => t += (parseInt(i.value)||0));
            document.getElementById(`tot_${p}`).innerText = t;
        });
    }

    async function crearSalaOnline() {
        const id = prompt("Escribe un código de sala (ej: 1234):");
        if(!id || db.seleccionados.length < 2) return;
        document.getElementById('loading').style.display='flex';
        let pts = {}; db.seleccionados.forEach(p => pts[p] = Array(RONDAS.length).fill(0));
        await fetch(API, { method:'POST', body: JSON.stringify({ accion:"crear_sala", salaId: id, host: "Tú", jugadores: db.seleccionados, puntos: pts }), headers:{"Content-Type":"text/plain"} });
        alert("Sala creada con éxito. Tus amigos ya pueden unirse.");
        document.getElementById('loading').style.display='none';
        startF();
    }

    async function addP() {
        const n = document.getElementById('nameIn').value; if(!n) return;
        await fetch(API, { method:'POST', body: JSON.stringify({ accion:"nuevo_jugador", nombre: db.emoji+" "+n }), headers:{"Content-Type":"text/plain"} });
        location.reload();
    }
    
    function tE() { const p = document.getElementById('ePop'); p.style.display = p.style.display==='grid'?'none':'grid'; }
    function setE(e) { db.emoji = e; document.getElementById('eBtn').innerText = e; tE(); }
    function renderHist(h) { /* Lógica de historial */ }
</script>
</body>
</html>

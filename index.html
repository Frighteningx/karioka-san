<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • v5.0 Multiplayer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --accent-glow: rgba(56, 189, 248, 0.2);
            --text: #f1f5f9; --text-dim: #94a3b8; --danger: #f43f5e; --success: #10b981; --border: rgba(255,255,255,0.1);
        }
        body { margin: 0; padding: 10px; background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .container { max-width: 800px; margin: 0 auto; width: 100%; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        .mode-selector { display: flex; background: #0f172a; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: var(--accent); color: var(--bg); }
        h1 { font-size: 1.8rem; text-align: center; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 12px 15px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .score-input:disabled { opacity: 0.5; background: #0f172a !important; color: var(--accent); }
        
        /* Estilos anteriores se mantienen */
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
        .player-chip { display: inline-flex; align-items: center; gap: 8px; background: #1e293b; padding: 8px 15px; border-radius: 20px; cursor: pointer; border: 1px solid #334155; margin: 5px; }
        .player-chip.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
        .table-wrapper { overflow-x: auto; border-radius: 12px; background: #0b1120; padding: 10px; }
        .karioka-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .karioka-table th, .karioka-table td { padding: 10px; text-align: center; border-bottom: 1px solid #334155; }
        .score-input { width: 50px; text-align: center; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 4px; padding: 5px; }
        .history-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--accent); }
        .history-winner-btn { background: transparent; color: var(--success); font-weight: 800; border: none; cursor: pointer; text-decoration: underline; }
        .detalle-tabla { display: none; margin-top: 10px; }
        .loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="globalLoader" class="loader">
    <div style="text-align:center;">
        <div style="border: 4px solid var(--accent); border-top: 4px solid transparent; width: 45px; height: 45px; border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto;"></div>
        <p style="margin-top:15px; font-weight: 600;">SINCRO ONLINE...</p>
    </div>
</div>

<div class="container">
    <h1>Karioka Pro</h1>

    <div class="mode-selector">
        <button id="btnLocal" class="mode-btn active" onclick="setModo('local')">MODO FÍSICO</button>
        <button id="btnOnline" class="mode-btn" onclick="setModo('online')">MODO ONLINE</button>
    </div>

    <div id="panelOnline" class="card" style="display:none;">
        <div id="setupOnline">
            <input type="text" id="inputSalaId" placeholder="Código de Sala (ej: 1234)" style="margin-bottom:10px;">
            <div style="display:flex; gap:10px;">
                <button onclick="unirseASala()" style="flex:1;">Unirse a Sala</button>
                <button onclick="crearSala()" style="background:var(--card); border:1px solid var(--accent); color:var(--accent); flex:1;">Crear Sala</button>
            </div>
        </div>
        <div id="statusSala" style="display:none; text-align:center;">
            <p>Conectado a Sala: <strong id="displaySalaId" style="color:var(--accent);"></strong></p>
            <p id="labelRol" style="font-size:0.8rem; opacity:0.7;"></p>
            <button onclick="salirSala()" style="background:var(--danger); color:white; padding:5px 10px;">Salir</button>
        </div>
    </div>

    <div class="card">
        <div class="header-row">
            <h2 id="titleSeccionPartida">Partida</h2>
            <button id="mainGameBtn" onclick="gestionarBotonPartida()">Iniciar Partida</button>
        </div>
        <div id="chipsContainer"></div>
        <div id="gameZone" style="display:none; margin-top:20px;">
            <div class="table-wrapper">
                <table class="karioka-table">
                    <thead><tr id="tableHeader"></tr></thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot><tr id="tableFooter" style="color:var(--accent);"></tr></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header-row">
            <h2>Jugadores</h2>
            <button id="cancelEditBtn" style="display:none; background:var(--danger);" onclick="resetPlayerForm()">X</button>
        </div>
        <div style="display:flex; gap:10px;">
            <div id="currentEmoji" style="font-size:1.5rem; background:#334155; padding:10px; border-radius:10px; cursor:pointer;" onclick="toggleEmojiWindow()">👤</div>
            <input type="text" id="playerName" placeholder="Nombre...">
            <button onclick="savePlayer()">Añadir</button>
        </div>
        <div id="emojiWindow" style="display:none; grid-template-columns: repeat(5, 1fr); gap:10px; margin-top:10px; background:var(--card); padding:10px; border-radius:10px; border:1px solid var(--accent);">
            <div onclick="selectEmoji('👤')">👤</div><div onclick="selectEmoji('🦁')">🦁</div><div onclick="selectEmoji('🐯')">🐯</div><div onclick="selectEmoji('🔥')">🔥</div><div onclick="selectEmoji('💎')">💎</div>
        </div>
        <div id="registeredPlayersList" style="margin-top:15px;"></div>
    </div>

    <div class="card">
        <h2>Ranking</h2>
        <div style="height: 250px;"><canvas id="statsChart"></canvas></div>
    </div>

    <details>
        <summary>Historial de Juegos</summary>
        <div class="history-content" id="historyList"></div>
    </details>
</div>

<script>
    const API_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; 
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];
    
    let jugadores = [], historial = [], seleccionados = [], currentEmoji = '👤', editingOldName = null, chart = null;
    let fechaInicioTS = null, juegoActivo = false, modo = 'local';
    
    // Variables Online
    let salaId = null, esHost = false, intervalSync = null;

    window.onload = loadData;

    function setModo(m) {
        if(juegoActivo) return alert("Finaliza la partida actual antes de cambiar de modo.");
        modo = m;
        document.getElementById('btnLocal').classList.toggle('active', m === 'local');
        document.getElementById('btnOnline').classList.toggle('active', m === 'online');
        document.getElementById('panelOnline').style.display = m === 'online' ? 'block' : 'none';
        if(m === 'local') salirSala();
    }

    async function crearSala() {
        if(seleccionados.length < 2) return alert("Selecciona jugadores para la sala.");
        const id = document.getElementById('inputSalaId').value.trim();
        if(!id) return alert("Pon un ID de sala.");
        
        showLoader(true);
        salaId = id;
        esHost = true;
        
        let puntos = {};
        seleccionados.forEach(n => puntos[n] = Array(RONDAS.length).fill(0));

        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ accion: "crear_sala", salaId: id, host: "Tú", jugadores: seleccionados, puntos: puntos })
        });
        
        setupUIsala();
        iniciarPartida();
        showLoader(false);
    }

    async function unirseASala() {
        const id = document.getElementById('inputSalaId').value.trim();
        if(!id) return alert("ID de sala?");
        
        showLoader(true);
        const res = await fetch(`${API_URL}?salaId=${id}`);
        const data = await res.json();
        
        if(data.error) {
            alert(data.error);
        } else {
            salaId = id;
            esHost = false;
            seleccionados = data.jugadores;
            setupUIsala();
            juegoActivo = true;
            document.getElementById('gameZone').style.display = 'block';
            updateGameTable(data.puntos);
            intervalSync = setInterval(syncOnline, 15000); // Polling cada 15 seg
        }
        showLoader(false);
    }

    async function syncOnline() {
        const res = await fetch(`${API_URL}?salaId=${salaId}`);
        const data = await res.json();
        if(!data.error) updateGameTable(data.puntos);
    }

    function setupUIsala() {
        document.getElementById('setupOnline').style.display = 'none';
        document.getElementById('statusSala').style.display = 'block';
        document.getElementById('displaySalaId').innerText = salaId;
        document.getElementById('labelRol').innerText = esHost ? "Eres el ADMINISTRADOR (Solo tú editas)" : "Eres ESPECTADOR (Vista automática)";
    }

    function salirSala() {
        clearInterval(intervalSync);
        salaId = null;
        esHost = false;
        juegoActivo = false;
        document.getElementById('setupOnline').style.display = 'block';
        document.getElementById('statusSala').style.display = 'none';
        document.getElementById('gameZone').style.display = 'none';
    }

    // Adaptación de funciones existentes
    function updateGameTable(puntosCargados = null) {
        document.getElementById('tableHeader').innerHTML = '<th>Ronda</th>' + seleccionados.map(n => `<th>${n.split(' ')[1] || n}</th>`).join('');
        document.getElementById('tableBody').innerHTML = RONDAS.map((r, ri) => `
            <tr>
                <td class="ronda-name">${r}</td>
                ${seleccionados.map(n => `
                    <td><input type="number" class="score-input" data-player="${n}" value="${puntosCargados ? puntosCargados[n][ri] : 0}" ${(!esHost && modo==='online') ? 'disabled' : ''} oninput="calcTotal()"></td>
                `).join('')}
            </tr>`).join('');
        calcTotal();
    }

    async function calcTotal() {
        let currentPuntos = {};
        seleccionados.forEach(n => {
            let t = 0;
            currentPuntos[n] = [];
            document.querySelectorAll(`.score-input[data-player="${n}"]`).forEach(i => {
                let val = parseInt(i.value) || 0;
                t += val;
                currentPuntos[n].push(val);
            });
            document.getElementById(`total_${n}`).innerText = t;
        });

        // Si es host, subir cambios al Excel automáticamente
        if(esHost && modo === 'online') {
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "actualizar_sala", salaId: salaId, puntos: currentPuntos }) });
        }
    }

    // --- EL RESTO DE FUNCIONES (loadData, savePlayer, finalizarJuego, etc) SE MANTIENEN IGUAL ---
    // Solo asegúrate de copiar las que ya teníamos en el paso anterior
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • v8.0 High Performance</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #22c55e; --sky: #38bdf8; --text: #f8fafc; --danger: #ef4444; --border: rgba(255,255,255,0.06); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Dashboard de Juego Online */
        .game-mesa { background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%); border-radius: 30px; padding: 20px; border: 2px solid var(--sky); position: relative; margin: 15px 0; }
        .turn-indicator { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--sky); color: #000; padding: 5px 20px; border-radius: 20px; font-weight: 900; font-size: 0.8rem; box-shadow: 0 0 15px var(--sky); }
        
        .mesa-center { display: flex; justify-content: center; gap: 30px; margin: 30px 0; }
        .card-slot { width: 70px; height: 100px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; transition: 0.3s; }
        .deck-pile { background: linear-gradient(135deg, #334155, #1e293b); border: 2px solid var(--sky); color: var(--sky); cursor: pointer; }
        .discard-pile { background: #fff; color: #000; font-size: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .hand-container { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 80px; padding: 10px; }
        .card-v { width: 50px; height: 75px; background: #fff; color: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: 0.2s; user-select: none; border: 2px solid transparent; }
        .card-v.red { color: var(--danger); }
        .card-v.selected { transform: translateY(-15px); border-color: var(--sky); box-shadow: 0 15px 30px rgba(56, 189, 248, 0.4); }
        
        /* UI Elements */
        .status-bar { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--sky); margin-bottom: 10px; padding: 0 10px; }
        .sync-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .btn { border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--sky); color: #000; }
        .btn-action { background: var(--accent); color: #000; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: #fff; margin-top: 10px; }
        
        .chip { display: inline-block; padding: 8px 15px; background: #1e293b; border-radius: 20px; margin: 4px; font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; }
        .chip.active { border-color: var(--sky); background: rgba(56, 189, 248, 0.1); color: var(--sky); }
        
        .loader { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(2,6,23,0.9); display: none; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="loader" class="loader"><div style="text-align:center;"><p>Cargando mesa...</p></div></div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 style="font-size: 1.2rem; color: var(--sky);">Karioka PRO</h1>
        <div id="syncIndicator" style="display:none;"><span class="sync-dot"></span><span style="font-size:0.6rem; color:var(--accent);">SINCRO</span></div>
    </div>

    <div style="display:flex; gap:5px; background:#0f172a; padding:5px; border-radius:12px; margin-bottom:15px;">
        <button onclick="switchMode('fisico')" id="mFisico" class="btn" style="flex:1; font-size:0.7rem; background:var(--sky); color:#000;">FÍSICO</button>
        <button onclick="switchMode('online')" id="mOnline" class="btn" style="flex:1; font-size:0.7rem; background:transparent; color:var(--text);">ONLINE</button>
    </div>

    <div id="areaOnline" style="display:none;">
        <div id="onlineLogin" class="card">
            <input type="text" id="salaId" placeholder="Código de Sala" style="width:100%; padding:12px; background:#020617; border:1px solid #334155; color:#fff; border-radius:10px; margin-bottom:10px;">
            <button class="btn btn-primary" onclick="conectarSala()">Unirse a Partida</button>
        </div>

        <div id="juegoActivo" style="display:none;">
            <div class="status-bar">
                <span id="txtLog">Preparando mazo...</span>
                <span id="txtFase">ROBAR</span>
            </div>
            
            <div class="game-mesa">
                <div id="indicadorTurno" class="turn-indicator">TURNO DE: --</div>
                <div class="mesa-center">
                    <div class="card-slot deck-pile" onclick="ejecutarAccion('robar')">MAZO</div>
                    <div id="cardPozo" class="card-slot discard-pile" onclick="ejecutarAccion('robar_pozo')">--</div>
                </div>
                <div id="miMano" class="hand-container"></div>
            </div>

            <button id="btnTirar" class="btn btn-action" style="display:none;" onclick="ejecutarAccion('tirar')">DESCARTAR SELECCIONADA</button>
            <button class="btn btn-danger" onclick="salirSala()">Abandonar Sala</button>
        </div>
    </div>

    <div id="areaFisica" class="card">
        <h2 style="font-size:0.8rem; color:var(--accent); margin-top:0;">REGISTRO DE PUNTOS</h2>
        <div id="chipsContainer"></div>
        <button class="btn btn-primary" style="margin-top:15px;" onclick="iniciarFisico()">Iniciar Nueva Partida</button>
        
        <div id="tablaPuntos" style="display:none; margin-top:20px; overflow-x:auto;">
             <table style="width:100%; border-collapse:collapse; font-size:0.75rem;">
                <thead id="tHead"></thead>
                <tbody id="tBody"></tbody>
             </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    let state = { modo: 'fisico', jugadores: [], seleccionados: [], sala: null, user: "", selCard: null, polling: null };

    window.onload = loadData;

    async function loadData() {
        const res = await fetch(API_URL);
        const data = await res.json();
        state.jugadores = data.jugadores;
        renderPlayers();
    }

    function renderPlayers() {
        const container = document.getElementById('chipsContainer');
        container.innerHTML = '';
        state.jugadores.forEach(j => {
            const c = document.createElement('div');
            c.className = `chip ${state.seleccionados.includes(j.nombre) ? 'active' : ''}`;
            c.innerHTML = j.nombre;
            c.onclick = () => {
                if(state.seleccionados.includes(j.nombre)) state.seleccionados = state.seleccionados.filter(x => x !== j.nombre);
                else state.seleccionados.push(j.nombre);
                renderPlayers();
            };
            container.appendChild(c);
        });
    }

    function switchMode(m) {
        state.modo = m;
        document.getElementById('mFisico').style.background = m === 'fisico' ? 'var(--sky)' : 'transparent';
        document.getElementById('mOnline').style.background = m === 'online' ? 'var(--sky)' : 'transparent';
        document.getElementById('areaFisica').style.display = m === 'fisico' ? 'block' : 'none';
        document.getElementById('areaOnline').style.display = m === 'online' ? 'block' : 'none';
    }

    async function conectarSala() {
        const id = document.getElementById('salaId').value;
        const nombre = prompt("¿Cuál es tu nombre de jugador?");
        if(!id || !nombre) return;
        
        state.user = nombre;
        state.sala = id;
        document.getElementById('loader').style.display = 'flex';
        
        await sync(true); // Sincronización inicial fuerte
        
        document.getElementById('onlineLogin').style.display = 'none';
        document.getElementById('juegoActivo').style.display = 'block';
        document.getElementById('loader').style.display = 'none';
        
        // Iniciar polling silencioso cada 5 segundos
        state.polling = setInterval(() => sync(false), 5000);
    }

    async function sync(isFirst) {
        if(!isFirst) document.getElementById('syncIndicator').style.display = 'block';
        
        try {
            const res = await fetch(`${API_URL}?salaId=${state.sala}`);
            const data = await res.json();
            
            if(data.error) return salirSala();
            
            const g = data.game;
            const esMiTurno = g.jugadores[g.turno] === state.user;
            
            // Actualizar UI
            document.getElementById('indicadorTurno').innerText = `TURNO DE: ${g.jugadores[g.turno]} ${esMiTurno ? '(TÚ)' : ''}`;
            document.getElementById('txtLog').innerText = g.log;
            document.getElementById('txtFase').innerText = g.fase.toUpperCase();
            
            const pozo = document.getElementById('cardPozo');
            pozo.innerText = g.pozo[0];
            pozo.className = (g.pozo[0].includes('♥') || g.pozo[0].includes('♦')) ? 'card-slot discard-pile red' : 'card-slot discard-pile';
            
            // Render Mano
            const manoContainer = document.getElementById('miMano');
            manoContainer.innerHTML = '';
            (g.manos[state.user] || []).forEach(c => {
                const dv = document.createElement('div');
                dv.className = `card-v ${state.selCard === c ? 'selected' : ''} ${(c.includes('♥')||c.includes('♦')) ? 'red' : ''}`;
                dv.innerText = c;
                dv.onclick = () => {
                    if(esMiTurno && g.fase === 'tirar') {
                        state.selCard = c;
                        renderMano(g.manos[state.user], g);
                    }
                };
                manoContainer.appendChild(dv);
            });

            document.getElementById('btnTirar').style.display = (esMiTurno && g.fase === 'tirar' && state.selCard) ? 'block' : 'none';

        } catch(e) { console.error("Sync Error"); }
        
        document.getElementById('syncIndicator').style.display = 'none';
    }

    function renderMano(cartas, g) {
        const esMiTurno = g.jugadores[g.turno] === state.user;
        const manoContainer = document.getElementById('miMano');
        manoContainer.innerHTML = '';
        cartas.forEach(c => {
            const dv = document.createElement('div');
            dv.className = `card-v ${state.selCard === c ? 'selected' : ''} ${(c.includes('♥')||c.includes('♦')) ? 'red' : ''}`;
            dv.innerText = c;
            dv.onclick = () => {
                if(esMiTurno && g.fase === 'tirar') {
                    state.selCard = c;
                    renderMano(cartas, g);
                    document.getElementById('btnTirar').style.display = 'block';
                }
            };
            manoContainer.appendChild(dv);
        });
    }

    async function ejecutarAccion(tipo) {
        // Optimistic UI: Si robamos, mostramos que estamos procesando
        document.getElementById('syncIndicator').style.display = 'block';
        
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                accion: "accion_juego",
                salaId: state.sala,
                tipo: tipo,
                user: state.user,
                carta: state.selCard
            }),
            headers: {"Content-Type":"text/plain"}
        });
        
        state.selCard = null;
        await sync(false);
    }

    function salirSala() {
        clearInterval(state.polling);
        location.reload();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • Master 6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --text-dim: #94a3b8; --success: #10b981; --danger: #f43f5e; --border: rgba(255,255,255,0.06); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 22px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        h1 { text-align: center; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; margin: 20px 0; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 12px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.96); }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 14px; border-radius: 10px; width: 100%; outline: none; margin-bottom: 10px; }
        .chip { display: inline-flex; align-items: center; gap: 8px; background: #334155; padding: 10px 18px; border-radius: 30px; cursor: pointer; margin: 5px; border: 1px solid transparent; font-size: 0.9rem; }
        .chip.active { border-color: var(--accent); background: rgba(56, 189, 248, 0.15); color: var(--accent); font-weight: bold; }
        .table-wrap { overflow-x: auto; margin-top: 15px; border-radius: 12px; background: #0b1120; border: 1px solid var(--border); }
        .k-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .k-table th, .k-table td { padding: 12px; border-bottom: 1px solid #334155; text-align: center; }
        .score-in { width: 55px; text-align: center; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px; padding: 6px; }
        .emoji-pop { position: absolute; background: var(--card); border: 1px solid var(--accent); border-radius: 20px; padding: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 1000; bottom: 70px; left: 0; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .hist-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .hist-winner-btn { background: transparent; color: var(--success); font-weight: bold; border: none; cursor: pointer; text-decoration: underline; font-size: 1.1rem; }
        .detalle-tabla { display: none; margin-top: 15px; padding: 10px; background: #0b1120; border-radius: 10px; }
        .loader { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(15,23,42,0.95); display: none; justify-content: center; align-items: center; z-index: 5000; }
        .spinner { border: 4px solid var(--accent); border-top: 4px solid transparent; width: 50px; height: 40px; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loader"><div style="text-align:center;"><div class="spinner"></div><p id="loaderMsg" style="margin-top:20px; font-weight:bold;">SINCRONIZANDO...</p></div></div>

<div class="container">
    <h1>Karioka Pro Master</h1>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:0.9rem; color:var(--accent); letter-spacing:1px;">MESA DE JUEGO</h2>
            <button id="btnMain" onclick="gestionarPartida()">Iniciar Nueva Partida</button>
        </div>
        <div id="chipsPartida"></div>
        
        <div id="zonaJuego" style="display:none; margin-top:20px;">
            <div class="table-wrap">
                <table class="k-table">
                    <thead id="hTable"></thead>
                    <tbody id="bTable"></tbody>
                    <tfoot id="fTable"></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div class="card" style="position:relative;">
        <h2 style="font-size:0.9rem; color:var(--accent); margin-bottom:15px;">GESTIÓN DE PERFILES</h2>
        <div style="display:flex; gap:12px;">
            <div id="emojiBtn" onclick="toggleEmoji()" style="background:#334155; padding:12px; border-radius:12px; cursor:pointer; font-size:1.6rem; min-width:55px; text-align:center;">👤</div>
            <input type="text" id="nameIn" placeholder="Nombre del jugador...">
            <button onclick="addJugador()">Añadir</button>
        </div>
        <div id="emojiWindow" class="emoji-pop">
            <div onclick="setEmoji('👤')">👤</div><div onclick="setEmoji('🦁')">🦁</div><div onclick="setEmoji('🐯')">🐯</div>
            <div onclick="setEmoji('🦊')">🦊</div><div onclick="setEmoji('🦄')">🦄</div><div onclick="setEmoji('🤖')">🤖</div>
            <div onclick="setEmoji('🥷')">🥷</div><div onclick="setEmoji('💎')">💎</div><div onclick="setEmoji('🔥')">🔥</div><div onclick="setEmoji('🐙')">🐙</div>
        </div>
        <div id="listaTodos" style="margin-top:20px; display:flex; flex-wrap:wrap;"></div>
    </div>

    <div class="card">
        <h2 style="font-size:0.9rem; color:var(--accent); margin-bottom:15px;">RANKING DE VICTORIAS</h2>
        <div style="height:250px;"><canvas id="statsChart"></canvas></div>
    </div>

    <details class="card">
        <summary style="cursor:pointer; font-weight:bold; color:var(--accent);">AUDITORÍA DE PARTIDAS</summary>
        <div id="historialList" style="margin-top:20px;"></div>
    </details>
</div>

<script>
    // CAMBIA ESTA URL POR LA TUYA (/exec)
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];

    let state = { jugadores: [], historial: [], seleccionados: [], emoji: "👤", activo: false, tsInicio: null };
    let myChart = null;

    window.onload = init;

    async function init() {
        showL(true, "Cargando datos...");
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            if(data.error) throw new Error(data.error);
            state.jugadores = data.jugadores || [];
            state.historial = data.historial || [];
            render();
        } catch (e) {
            alert("ERROR DE CONEXIÓN: Verifica que el ID de la hoja sea correcto y que hayas publicado el script para 'Cualquier persona'.\nDetalle: " + e.message);
        }
        showL(false);
    }

    function render() {
        const pZone = document.getElementById('chipsPartida');
        const lZone = document.getElementById('listaTodos');
        pZone.innerHTML = ''; lZone.innerHTML = '';

        state.jugadores.forEach(j => {
            const c = document.createElement('div');
            c.className = `chip ${state.seleccionados.includes(j.nombre) ? 'active' : ''}`;
            c.innerHTML = j.nombre;
            c.onclick = () => { if(!state.activo) togglePlayer(j.nombre); };
            pZone.appendChild(c);

            const i = document.createElement('div');
            i.className = 'chip'; i.style.opacity = "0.7";
            i.innerHTML = j.nombre + " ✏️";
            lZone.appendChild(i);
        });

        renderChart();
        renderHistorial();
    }

    function togglePlayer(n) {
        if(state.seleccionados.includes(n)) state.seleccionados = state.seleccionados.filter(x => x !== n);
        else state.seleccionados.push(n);
        render();
    }

    function gestionarPartida() {
        if(!state.activo) {
            if(state.seleccionados.length < 2) return alert("Selecciona al menos 2 jugadores.");
            state.activo = true;
            state.tsInicio = Date.now();
            document.getElementById('btnMain').innerText = "Finalizar Partida";
            document.getElementById('btnMain').style.background = "var(--success)";
            document.getElementById('zonaJuego').style.display = 'block';
            updateTable();
        } else {
            finalizar();
        }
    }

    function updateTable() {
        const h = document.getElementById('hTable');
        const b = document.getElementById('bTable');
        const f = document.getElementById('fTable');
        h.innerHTML = `<tr><th>Fase</th>${state.seleccionados.map(n => `<th>${n.split(' ')[1]||n}</th>`).join('')}</tr>`;
        b.innerHTML = RONDAS.map(r => `<tr><td style="text-align:left; font-size:0.8rem;">${r}</td>${state.seleccionados.map(n => `<td><input type="number" class="score-in" data-p="${n}" oninput="sumar()"></td>`).join('')}</tr>`).join('');
        f.innerHTML = `<tr style="color:var(--accent); font-weight:800;"><td>TOTAL</td>${state.seleccionados.map(n => `<td id="total_${n}">0</td>`).join('')}</tr>`;
    }

    function sumar() {
        state.seleccionados.forEach(n => {
            let t = 0;
            document.querySelectorAll(`[data-p="${n}"]`).forEach(i => t += (parseInt(i.value)||0));
            document.getElementById(`total_${n}`).innerText = t;
        });
    }

    async function finalizar() {
        let results = state.seleccionados.map(n => ({ nombre: n, score: parseInt(document.getElementById(`total_${n}`).innerText) })).sort((a,b) => a.score - b.score);
        if(!confirm(`🏆 El ganador es ${results[0].nombre}. ¿Guardar resultados?`)) return;

        showL(true, "Guardando partida...");
        const tsFin = Date.now();
        const d = new Date();

        let tablaCompleta = { jugadores: state.seleccionados, rondas: RONDAS, puntos: {} };
        state.seleccionados.forEach(n => {
            tablaCompleta.puntos[n] = Array.from(document.querySelectorAll(`[data-p="${n}"]`)).map(i => parseInt(i.value)||0);
        });

        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                accion: "guardar_juego",
                tsInicio: state.tsInicio, tsFin: tsFin,
                fechaStr: d.toLocaleDateString(),
                horaInicioStr: new Date(state.tsInicio).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                horaFinStr: d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                ganador: results[0].nombre,
                perdedores: results.slice(1).map(x => x.nombre),
                puntajeGanador: results[0].score,
                tablaCompleta: tablaCompleta
            }),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        });

        state.activo = false; state.seleccionados = [];
        document.getElementById('btnMain').innerText = "Iniciar Nueva Partida";
        document.getElementById('btnMain').style.background = "var(--accent)";
        document.getElementById('zonaJuego').style.display = 'none';
        await init();
    }

    function renderHistorial() {
        const zone = document.getElementById('historialList');
        if(state.historial.length === 0) { zone.innerHTML = "<p style='text-align:center; opacity:0.5;'>Sin historial.</p>"; return; }
        
        zone.innerHTML = state.historial.map((h, i) => {
            let mini = '';
            if(h.detalles) {
                mini = `<div id="det_${i}" class="detalle-tabla"><table class="k-table" style="font-size:0.7rem;"><thead><tr><th>Fase</th>`;
                h.detalles.jugadores.forEach(j => mini += `<th>${j.split(' ')[1]||j}</th>`);
                mini += `</tr></thead><tbody>`;
                h.detalles.rondas.forEach((r, ri) => {
                    mini += `<tr><td>${r}</td>`;
                    h.detalles.jugadores.forEach(j => mini += `<td>${h.detalles.puntos[j][ri]}</td>`);
                    mini += `</tr>`;
                });
                mini += `</tbody></table></div>`;
            }
            return `
                <div class="hist-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button class="hist-winner-btn" onclick="toggleDet(${i})">🏆 ${h.ganador}</button>
                        <div style="text-align:right;">
                            <span style="color:var(--accent); font-weight:bold;">${h.puntaje} pts</span>
                            <div style="font-size:0.6rem; opacity:0.6;">⏱ ${h.duracion}</div>
                        </div>
                    </div>
                    <div style="font-size:0.65rem; opacity:0.5; margin:5px 0;">${h.fecha} | ${h.inicio} - ${h.fin}</div>
                    ${mini}
                </div>
            `;
        }).join('');
    }

    async function addJugador() {
        const name = document.getElementById('nameIn').value.trim();
        if(!name) return;
        showL(true, "Añadiendo jugador...");
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ accion: "nuevo_jugador", nombre: state.emoji + " " + name }),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        });
        document.getElementById('nameIn').value = '';
        await init();
    }

    function renderChart() {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: state.jugadores.map(j => j.nombre),
                datasets: [{ label: 'Ganadas', data: state.jugadores.map(j => j.ganados), backgroundColor: '#10b981' }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
        });
    }

    function toggleDet(i) { const el = document.getElementById(`det_${i}`); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    function toggleEmoji() { const w = document.getElementById('emojiWindow'); w.style.display = (w.style.display === 'grid') ? 'none' : 'grid'; }
    function setEmoji(e) { state.emoji = e; document.getElementById('emojiBtn').innerText = e; toggleEmoji(); }
    function showL(s, msg = "SINCRONIZANDO...") { 
        document.getElementById('loaderMsg').innerText = msg;
        document.getElementById('loader').style.display = s ? 'flex' : 'none'; 
    }
</script>
</body>
</html>

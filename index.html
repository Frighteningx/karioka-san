<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • v9.0 Stealth Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #22c55e; --sky: #38bdf8; --text: #f8fafc; --danger: #ef4444; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Barra de Sincronización Silenciosa */
        .sync-bar { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: transparent; z-index: 9999; }
        .sync-progress { height: 100%; width: 0%; background: var(--sky); transition: width 0.3s; }
        .sync-active .sync-progress { width: 100%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Mesa de Juego */
        .mesa { background: radial-gradient(circle at center, #1e3a8a 0%, #020617 100%); border-radius: 40px; padding: 25px; border: 1px solid var(--sky); position: relative; margin-top: 10px; }
        .turn-badge { background: var(--sky); color: #000; padding: 4px 15px; border-radius: 20px; font-weight: 800; font-size: 0.7rem; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); text-transform: uppercase; box-shadow: 0 0 15px var(--sky); }
        
        .slots { display: flex; justify-content: center; gap: 40px; margin: 20px 0; }
        .card-box { width: 65px; height: 95px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s; }
        .deck { background: #1e293b; border: 2px dashed var(--sky); color: var(--sky); cursor: pointer; font-size: 0.7rem; }
        .pozo { background: #fff; color: #000; font-size: 1.4rem; box-shadow: 0 10px 20px rgba(0,0,0,0.4); cursor: pointer; }

        /* Mano de Cartas */
        .hand { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; padding: 10px; min-height: 100px; }
        .card-v { width: 42px; height: 65px; background: #fff; color: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; cursor: pointer; transition: 0.2s; border: 2px solid transparent; user-select: none; }
        .card-v.red { color: var(--danger); }
        .card-v.selected { transform: translateY(-20px); border-color: var(--sky); box-shadow: 0 15px 25px rgba(56, 189, 248, 0.4); }

        /* UI de Puntajes */
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); }
        .btn { border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn-sky { background: var(--sky); color: #000; }
        .btn-success { background: var(--accent); color: #000; }
        
        .chip { display: inline-block; padding: 6px 14px; background: #1e293b; border-radius: 20px; margin: 3px; font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; }
        .chip.active { border-color: var(--sky); background: rgba(56, 189, 248, 0.1); color: var(--sky); }
        
        .loader-full { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(5px); }
        .score-in { width: 45px; background: #020617; border: 1px solid #334155; color: #fff; text-align: center; border-radius: 5px; padding: 5px; font-size: 0.8rem; }
        
        h2 { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>

<div id="syncBar" class="sync-bar"><div class="sync-progress"></div></div>
<div id="hardLoader" class="loader-full"><div style="text-align:center;"><p>Procesando...</p></div></div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h1 style="font-size: 1.1rem; color: var(--sky); margin:0;">Karioka PRO</h1>
        <div id="logMsg" style="font-size: 0.6rem; color: var(--sky); font-style: italic;">Esperando conexión...</div>
    </div>

    <div style="display:flex; background:#0f172a; padding:4px; border-radius:12px; margin-bottom:15px;">
        <button onclick="switchMode('fisico')" id="mFisico" style="flex:1; border:none; padding:8px; border-radius:8px; font-weight:bold; cursor:pointer; background:var(--sky); color:#000; font-size:0.7rem;">MODO FÍSICO</button>
        <button onclick="switchMode('online')" id="mOnline" style="flex:1; border:none; padding:8px; border-radius:8px; font-weight:bold; cursor:pointer; background:transparent; color:#fff; font-size:0.7rem;">MODO ONLINE</button>
    </div>

    <div id="areaOnline" style="display:none;">
        <div id="loginOnline" class="card">
            <input type="text" id="salaId" placeholder="ID de Sala" style="width:100%; padding:12px; background:#020617; border:1px solid #334155; color:#fff; border-radius:10px; margin-bottom:10px; outline:none;">
            <button class="btn btn-sky" onclick="conectarSala()">Entrar a Mesa Virtual</button>
        </div>

        <div id="juegoOnline" style="display:none;">
            <div class="mesa">
                <div id="txtTurno" class="turn-badge">TURNO DE: --</div>
                <div class="slots">
                    <div class="card-box deck" onclick="accion('robar')">MAZO<br>ROBAR</div>
                    <div id="pozoCard" class="card-box pozo" onclick="accion('robar_pozo')">--</div>
                </div>
                <div id="mano" class="hand"></div>
            </div>
            <button id="btnDescartar" class="btn btn-success" style="display:none;" onclick="accion('tirar')">DESCARTAR CARTA</button>
            <button class="btn" style="background:#334155; color:#fff;" onclick="location.reload()">Salir</button>
        </div>
    </div>

    <div id="areaFisica" class="card">
        <h2>Ranking y Puntos</h2>
        <div id="chipsPartida"></div>
        <button id="btnFisicoControl" class="btn btn-sky" onclick="controlPartidaFisica()">Iniciar Nueva Partida</button>
        
        <div id="zonaTabla" style="display:none; margin-top:20px;">
            <div style="overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse; font-size:0.7rem; text-align:center;">
                    <thead id="tHead"></thead>
                    <tbody id="tBody"></tbody>
                    <tfoot id="tFoot" style="font-weight:bold; color:var(--sky);"></tfoot>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];
    
    let st = { modo: 'fisico', sala: null, user: "", selCard: null, activo: false, ts: null, pSelected: [] };

    window.onload = async () => {
        const r = await fetch(API_URL);
        const d = await r.json();
        renderChips(d.jugadores);
    };

    function renderChips(jugadores) {
        const container = document.getElementById('chipsPartida');
        container.innerHTML = '';
        jugadores.forEach(j => {
            const div = document.createElement('div');
            div.className = `chip ${st.pSelected.includes(j.nombre) ? 'active' : ''}`;
            div.innerHTML = j.nombre;
            div.onclick = () => {
                if(st.activo) return;
                if(st.pSelected.includes(j.nombre)) st.pSelected = st.pSelected.filter(x => x !== j.nombre);
                else st.pSelected.push(j.nombre);
                renderChips(jugadores);
            };
            container.appendChild(div);
        });
    }

    function switchMode(m) {
        st.modo = m;
        document.getElementById('mFisico').style.background = m === 'fisico' ? 'var(--sky)' : 'transparent';
        document.getElementById('mOnline').style.background = m === 'online' ? 'var(--sky)' : 'transparent';
        document.getElementById('areaFisica').style.display = m === 'fisico' ? 'block' : 'none';
        document.getElementById('areaOnline').style.display = m === 'online' ? 'block' : 'none';
    }

    async function conectarSala() {
        const id = document.getElementById('salaId').value;
        const nombre = prompt("Tu nombre exacto:");
        if(!id || !nombre) return;
        st.sala = id; st.user = nombre;
        document.getElementById('hardLoader').style.display = 'flex';
        await sync();
        document.getElementById('loginOnline').style.display = 'none';
        document.getElementById('juegoOnline').style.display = 'block';
        document.getElementById('hardLoader').style.display = 'none';
        setInterval(sync, 5000); // Polling silencioso
    }

    async function sync() {
        document.getElementById('syncBar').classList.add('sync-active');
        try {
            const r = await fetch(`${API_URL}?salaId=${st.sala}`);
            const d = await r.json();
            if(d.error) return location.reload();
            
            const g = d.game;
            const miTurno = g.jugadores[g.turno] === st.user;
            
            document.getElementById('txtTurno').innerText = `Turno de: ${g.jugadores[g.turno]} ${miTurno ? '(TÚ)' : ''}`;
            document.getElementById('logMsg').innerText = g.log;
            
            const pozo = document.getElementById('pozoCard');
            pozo.innerText = g.pozo[0];
            pozo.style.color = (g.pozo[0].includes('♥')||g.pozo[0].includes('♦')) ? 'var(--danger)' : '#000';

            const manoContainer = document.getElementById('mano');
            manoContainer.innerHTML = '';
            (g.manos[st.user] || []).forEach(c => {
                const dv = document.createElement('div');
                dv.className = `card-v ${st.selCard === c ? 'selected' : ''} ${(c.includes('♥')||c.includes('♦')) ? 'red' : ''}`;
                dv.innerText = c;
                dv.onclick = () => { if(miTurno && g.fase === 'tirar') { st.selCard = c; sync(); } };
                manoContainer.appendChild(dv);
            });
            document.getElementById('btnDescartar').style.display = (miTurno && g.fase === 'tirar' && st.selCard) ? 'block' : 'none';
        } catch(e) {}
        setTimeout(() => document.getElementById('syncBar').classList.remove('sync-active'), 500);
    }

    async function accion(tipo) {
        document.getElementById('hardLoader').style.display = 'flex';
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ accion: "accion_juego", salaId: st.sala, tipo, user: st.user, carta: st.selCard }),
            headers: {"Content-Type":"text/plain"}
        });
        st.selCard = null;
        await sync();
        document.getElementById('hardLoader').style.display = 'none';
    }

    // Lógica Física
    function controlPartidaFisica() {
        if(!st.activo) {
            if(st.pSelected.length < 2) return alert("Selecciona jugadores.");
            st.activo = true; st.ts = Date.now();
            document.getElementById('btnFisicoControl').innerText = "Finalizar y Guardar KPI";
            document.getElementById('btnFisicoControl').className = "btn btn-success";
            document.getElementById('zonaTabla').style.display = 'block';
            renderTablaFisica();
        } else {
            finalizarFisico();
        }
    }

    function renderTablaFisica() {
        document.getElementById('tHead').innerHTML = `<tr><th>Fase</th>${st.pSelected.map(n => `<th>${n.split(' ')[1]||n}</th>`).join('')}</tr>`;
        document.getElementById('tBody').innerHTML = RONDAS.map(r => `<tr><td style="text-align:left;">${r}</td>${st.pSelected.map(n => `<td><input type="number" class="score-in" data-p="${n}" oninput="calcFisico()"></td>`).join('')}</tr>`).join('');
        document.getElementById('tFoot').innerHTML = `<tr><td>TOTAL</td>${st.pSelected.map(n => `<td id="tot_${n}">0</td>`).join('')}</tr>`;
    }

    function calcFisico() {
        st.pSelected.forEach(n => {
            let t = 0;
            document.querySelectorAll(`[data-p="${n}"]`).forEach(i => t += (parseInt(i.value)||0));
            document.getElementById(`tot_${n}`).innerText = t;
        });
    }

    async function finalizarFisico() {
        let r = st.pSelected.map(n => ({ n, s: parseInt(document.getElementById(`tot_${n}`).innerText) })).sort((a,b) => a.s - b.s);
        if(!confirm(`¿Ganador: ${r[0].n}?`)) return;
        document.getElementById('hardLoader').style.display = 'flex';
        
        let tabla = { jugadores: st.pSelected, rondas: RONDAS, puntos: {} };
        st.pSelected.forEach(n => tabla.puntos[n] = Array.from(document.querySelectorAll(`[data-p="${n}"]`)).map(i => parseInt(i.value)||0));

        await fetch(API_URL, { method: 'POST', body: JSON.stringify({
            accion: "guardar_juego", tsInicio: st.ts, tsFin: Date.now(), fecha: new Date().toLocaleDateString(),
            inicio: new Date(st.ts).toLocaleTimeString(), fin: new Date().toLocaleTimeString(),
            ganador: r[0].n, perdedores: r.slice(1).map(x => x.n), puntaje: r[0].s, tabla
        }), headers: {"Content-Type":"text/plain"} });
        location.reload();
    }
</script>
</body>
</html>

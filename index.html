<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • Ultimate Multi-Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --text-dim: #94a3b8; --success: #10b981; --danger: #f43f5e; --border: rgba(255,255,255,0.06); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 22px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        h1 { text-align: center; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; margin: 15px 0; }
        
        .mode-selector { display: flex; background: #0b1120; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: var(--accent); color: var(--bg); }

        button { background: var(--accent); color: var(--bg); border: none; padding: 12px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 14px; border-radius: 10px; width: 100%; outline: none; }
        
        .chip { display: inline-flex; align-items: center; gap: 8px; background: #334155; padding: 10px 18px; border-radius: 30px; cursor: pointer; margin: 5px; border: 1px solid transparent; font-size: 0.9rem; }
        .chip.active { border-color: var(--accent); background: rgba(56, 189, 248, 0.15); color: var(--accent); font-weight: bold; }
        
        .table-wrap { overflow-x: auto; margin-top: 15px; border-radius: 12px; background: #0b1120; border: 1px solid var(--border); }
        .k-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .k-table th, .k-table td { padding: 12px; border-bottom: 1px solid #334155; text-align: center; }
        .score-in { width: 55px; text-align: center; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px; padding: 6px; }
        
        .hand { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .card-v { width: 45px; height: 65px; background: white; color: #1e293b; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid #cbd5e1; font-size: 0.8rem; }
        .card-v.red { color: var(--danger); }
        .card-v.sel { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); transform: translateY(-5px); }

        .loader { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(15,23,42,0.95); display: none; justify-content: center; align-items: center; z-index: 5000; }
        .spinner { border: 4px solid var(--accent); border-top: 4px solid transparent; width: 40px; height: 40px; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .emoji-pop { position: absolute; background: var(--card); border: 1px solid var(--accent); border-radius: 20px; padding: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 1000; bottom: 70px; left: 0; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

<div id="loader" class="loader"><div style="text-align:center;"><div class="spinner"></div><p style="margin-top:20px; font-weight:bold;">SINCRONIZANDO...</p></div></div>

<div class="container">
    <h1>Karioka Pro Ultimate</h1>

    <div class="mode-selector">
        <button id="btnModoFisico" class="mode-btn active" onclick="setModo('fisico')">MODO FÍSICO</button>
        <button id="btnModoOnline" class="mode-btn" onclick="setModo('online')">MODO ONLINE</button>
    </div>

    <div id="panelOnline" class="card" style="display:none;">
        <input type="text" id="salaIdIn" placeholder="ID de Sala (ej: 1234)" style="margin-bottom:10px;">
        <div style="display:flex; gap:10px;">
            <button onclick="crearSala()" style="flex:1;">Crear Sala</button>
            <button onclick="unirseSala()" style="flex:1; background:var(--card); color:var(--accent); border:1px solid var(--accent);">Unirse</button>
        </div>
        <p id="salaStatus" style="font-size:0.7rem; text-align:center; margin-top:10px; color:var(--accent);"></p>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="titleSeccion" style="font-size:0.8rem; color:var(--accent); letter-spacing:1.5px;">MESA DE JUEGO</h2>
            <button id="btnMain" onclick="gestionarBoton()">Iniciar Partida</button>
        </div>
        <div id="chipsPartida"></div>
        <div id="zonaJuego" style="display:none;">
            <div class="table-wrap">
                <table class="k-table">
                    <thead id="hTable"></thead>
                    <tbody id="bTable"></tbody>
                    <tfoot><tr id="fTable" style="color:var(--accent); font-weight:800;"></tr></tfoot>
                </table>
            </div>

            <div id="zonaCartas" style="display:none; border-top:1px solid #334155; margin-top:20px; padding-top:20px;">
                <div style="display:flex; justify-content:center; gap:30px;">
                    <div onclick="accionCarta('robar')" style="width:60px; height:85px; border:2px dashed var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.7rem;">MAZO</div>
                    <div id="pozo" style="width:60px; height:85px; background:white; color:black; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold;">--</div>
                </div>
                <div id="miMano" class="hand"></div>
                <button id="btnTirar" onclick="accionCarta('tirar')" style="width:100%; margin-top:15px; background:var(--danger); display:none;">Tirar Carta Seleccionada</button>
            </div>
        </div>
    </div>

    <div class="card" style="position:relative;">
        <h2 style="font-size:0.8rem; color:var(--accent); margin-bottom:15px;">GESTIÓN JUGADORES</h2>
        <div style="display:flex; gap:10px;">
            <div id="emojiBtn" onclick="toggleEmoji()" style="background:#334155; padding:12px; border-radius:12px; cursor:pointer; font-size:1.5rem; min-width:55px; text-align:center;">👤</div>
            <input type="text" id="nameIn" placeholder="Nombre...">
            <button onclick="addJugador()">Añadir</button>
        </div>
        <div id="emojiWindow" class="emoji-pop">
            <div onclick="setEmoji('👤')">👤</div><div onclick="setEmoji('🦁')">🦁</div><div onclick="setEmoji('🦄')">🦄</div>
            <div onclick="setEmoji('🥷')">🥷</div><div onclick="setEmoji('🤖')">🤖</div><div onclick="setEmoji('💎')">💎</div>
            <div onclick="setEmoji('🔥')">🔥</div><div onclick="setEmoji('🦊')">🦊</div><div onclick="setEmoji('🍀')">🍀</div>
            <div onclick="setEmoji('🐙')">🐙</div>
        </div>
        <div id="listaTodos" style="margin-top:20px; display:flex; flex-wrap:wrap;"></div>
    </div>

    <div class="card"><h2>KPI Ranking</h2><div style="height:250px;"><canvas id="statsChart"></canvas></div></div>
    
    <details class="card"><summary style="cursor:pointer; color:var(--accent); font-weight:bold;">HISTORIAL AUDITORÍA</summary><div id="historialList"></div></details>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];

    let state = { jugadores: [], historial: [], seleccionados: [], emoji: "👤", modo: 'fisico', activo: false, tsInicio: null };
    let online = { salaId: null, esHost: false, interval: null, miNombre: "", cartaSel: null };
    let myChart = null;

    window.onload = init;

    async function init() {
        showL(true);
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            state.jugadores = data.jugadores || [];
            state.historial = data.historial || [];
            render();
        } catch (e) { alert("Error de conexión"); }
        showL(false);
    }

    function setModo(m) {
        if(state.activo) return alert("Finaliza la partida actual primero.");
        state.modo = m;
        document.getElementById('btnModoFisico').classList.toggle('active', m === 'fisico');
        document.getElementById('btnModoOnline').classList.toggle('active', m === 'online');
        document.getElementById('panelOnline').style.display = m === 'online' ? 'block' : 'none';
        if(m === 'fisico') { clearInterval(online.interval); document.getElementById('zonaCartas').style.display = 'none'; }
    }

    function render() {
        const pZone = document.getElementById('chipsPartida');
        const lZone = document.getElementById('listaTodos');
        pZone.innerHTML = ''; lZone.innerHTML = '';
        state.jugadores.forEach(j => {
            const c = document.createElement('div');
            c.className = `chip ${state.seleccionados.includes(j.nombre) ? 'active' : ''}`;
            c.innerHTML = j.nombre;
            c.onclick = () => { if(!state.activo) toggleP(j.nombre); };
            pZone.appendChild(c);

            const i = document.createElement('div');
            i.className = 'chip'; i.style.opacity = '0.6';
            i.innerHTML = j.nombre + " ✏️";
            lZone.appendChild(i);
        });
        renderStats();
        renderHist();
    }

    function toggleP(n) {
        if(state.seleccionados.includes(n)) state.seleccionados = state.seleccionados.filter(x => x !== n);
        else state.seleccionados.push(n);
        render();
    }

    function gestionarBoton() {
        if(!state.activo) {
            if(state.seleccionados.length < 2) return alert("Mínimo 2 jugadores.");
            state.activo = true;
            state.tsInicio = Date.now();
            document.getElementById('btnMain').innerText = "Finalizar y Guardar";
            document.getElementById('btnMain').style.background = "var(--success)";
            document.getElementById('zonaJuego').style.display = 'block';
            updateTable();
        } else {
            finalizar();
        }
    }

    async function crearSala() {
        if(state.seleccionados.length < 2) return alert("Selecciona chips primero.");
        const id = document.getElementById('salaIdIn').value;
        if(!id) return alert("ID de sala?");
        showL(true);
        online.salaId = id; online.esHost = true; online.miNombre = state.seleccionados[0];
        let puntos = {}; state.seleccionados.forEach(n => puntos[n] = Array(RONDAS.length).fill(0));
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "crear_sala", salaId: id, host: "Tú", jugadores: state.seleccionados, puntos: puntos }), headers: {"Content-Type":"text/plain"} });
        document.getElementById('salaStatus').innerText = "Conectado: " + id + " (ADMIN)";
        gestionarBoton();
        document.getElementById('zonaCartas').style.display = 'block';
        online.interval = setInterval(syncOnline, 10000);
        showL(false);
    }

    async function unirseSala() {
        const id = document.getElementById('salaIdIn').value;
        const nombre = prompt("Ingresa tu nombre exacto:");
        if(!id || !nombre) return;
        showL(true);
        const res = await fetch(`${API_URL}?salaId=${id}`);
        const data = await res.json();
        if(data.error) { alert(data.error); showL(false); return; }
        online.salaId = id; online.esHost = false; online.miNombre = nombre;
        state.seleccionados = data.jugadores;
        state.activo = true;
        document.getElementById('zonaJuego').style.display = 'block';
        document.getElementById('zonaCartas').style.display = 'block';
        document.getElementById('salaStatus').innerText = "Conectado: " + id + " (JUGADOR)";
        updateTable(data.puntos);
        online.interval = setInterval(syncOnline, 10000);
        showL(false);
    }

    async function syncOnline() {
        const res = await fetch(`${API_URL}?salaId=${online.salaId}`);
        const data = await res.json();
        if(!data.error) {
            updateTable(data.puntos);
            renderCartas(data.game);
        }
    }

    function renderCartas(game) {
        const pozo = document.getElementById('pozo');
        pozo.innerText = game.pozo[0];
        pozo.style.color = (game.pozo[0].includes('♥') || game.pozo[0].includes('♦')) ? 'var(--danger)' : 'black';
        
        const manoEl = document.getElementById('miMano');
        manoEl.innerHTML = '';
        const miMano = game.manos[online.miNombre] || [];
        miMano.forEach(c => {
            const d = document.createElement('div');
            d.className = `card-v ${online.cartaSel === c ? 'sel' : ''} ${(c.includes('♥')||c.includes('♦')) ? 'red' : ''}`;
            d.innerText = c;
            d.onclick = () => { online.cartaSel = c; renderCartas(game); document.getElementById('btnTirar').style.display = (game.jugadores[game.turno] === online.miNombre && game.fase === 'tirar') ? 'block' : 'none'; };
            manoEl.appendChild(d);
        });
    }

    async function accionCarta(t) {
        showL(true);
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "accion_juego", salaId: online.salaId, tipo: t, user: online.miNombre, carta: online.cartaSel }), headers: {"Content-Type":"text/plain"} });
        online.cartaSel = null;
        await syncOnline();
        showL(false);
    }

    function updateTable(puntosCargados = null) {
        const h = document.getElementById('hTable');
        const b = document.getElementById('bTable');
        h.innerHTML = `<tr><th>Fase</th>${state.seleccionados.map(n => `<th>${n.split(' ')[1]||n}</th>`).join('')}</tr>`;
        b.innerHTML = RONDAS.map((r, ri) => `<tr><td style="text-align:left; font-size:0.7rem;">${r}</td>${state.seleccionados.map(n => `<td><input type="number" class="score-in" data-p="${n}" value="${puntosCargados ? puntosCargados[n][ri] : 0}" ${(!online.esHost && state.modo==='online')?'disabled':''} oninput="sum()"></td>`).join('')}</tr>`).join('');
        document.getElementById('fTable').innerHTML = `<td>TOTAL</td>${state.seleccionados.map(n => `<td id="t_${n}">0</td>`).join('')}`;
        sum(false);
    }

    function sum(subirOnline = true) {
        let pts = {};
        state.seleccionados.forEach(n => {
            let t = 0; pts[n] = [];
            document.querySelectorAll(`[data-p="${n}"]`).forEach(i => { let v = parseInt(i.value)||0; t += v; pts[n].push(v); });
            document.getElementById(`t_${n}`).innerText = t;
        });
        if(subirOnline && online.esHost && state.modo === 'online') {
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "actualizar_sala", salaId: online.salaId, puntos: pts }), headers: {"Content-Type":"text/plain"} });
        }
    }

    async function finalizar() {
        let r = state.seleccionados.map(n => ({ n, s: parseInt(document.getElementById(`t_${n}`).innerText) })).sort((a,b) => a.s - b.s);
        if(!confirm(`Ganador: ${r[0].n}. ¿Guardar?`)) return;
        showL(true);
        const tsFin = Date.now(); const d = new Date();
        let tabla = { jugadores: state.seleccionados, rondas: RONDAS, puntos: {} };
        state.seleccionados.forEach(n => { tabla.puntos[n] = Array.from(document.querySelectorAll(`[data-p="${n}"]`)).map(i => parseInt(i.value)||0); });
        
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({
            accion: "guardar_juego", tsInicio: state.tsInicio, tsFin, fechaStr: d.toLocaleDateString(),
            horaInicioStr: new Date(state.tsInicio).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            horaFinStr: d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            ganador: r[0].n, perdedores: r.slice(1).map(x => x.n), puntajeGanador: r[0].s, tablaCompleta: tabla
        }), headers: {"Content-Type":"text/plain"} });

        state.activo = false; state.seleccionados = [];
        document.getElementById('btnMain').innerText = "Iniciar Partida";
        document.getElementById('zonaJuego').style.display = 'none';
        await init();
    }

    function toggleEmoji() { const w = document.getElementById('emojiWindow'); w.style.display = w.style.display === 'grid' ? 'none' : 'grid'; }
    function setEmoji(e) { state.emoji = e; document.getElementById('emojiBtn').innerText = e; toggleEmoji(); }
    async function addJugador() {
        const n = document.getElementById('nameIn').value; if(!n) return;
        showL(true);
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "nuevo_jugador", nombre: state.emoji + " " + n }), headers: {"Content-Type":"text/plain"} });
        document.getElementById('nameIn').value = ""; await init();
    }
    function showL(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function renderStats() { /* Lógica de Chart.js */ }
    function renderHist() { /* Lógica de historial */ }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • v12 Ultra-Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #22c55e; --sky: #38bdf8; --text: #f8fafc; --danger: #ef4444; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 10px; padding-bottom: 80px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Sistema de latido de sincronización */
        .heartbeat { position: fixed; top: 10px; right: 10px; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: none; box-shadow: 0 0 10px var(--accent); }
        
        .card { background: var(--card); border-radius: 20px; padding: 22px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        h1 { text-align: center; background: linear-gradient(90deg, #38bdf8, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; margin: 15px 0; }
        
        .mode-selector { display: flex; background: #0b1120; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: transparent; color: #94a3b8; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .mode-btn.active { background: var(--accent); color: #000; }

        button { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 14px; border-radius: 10px; width: 100%; outline: none; }
        
        .chip { display: inline-flex; align-items: center; gap: 8px; background: #334155; padding: 10px 18px; border-radius: 30px; cursor: pointer; margin: 5px; border: 1px solid transparent; }
        .chip.active { border-color: var(--sky); background: rgba(56, 189, 248, 0.15); color: var(--sky); font-weight: bold; }
        
        .mesa { background: radial-gradient(circle, #1e3a8a 0%, #020617 100%); border-radius: 40px; padding: 30px; border: 1px solid var(--sky); position: relative; margin: 15px 0; }
        .turn-badge { background: var(--sky); color: #000; padding: 5px 20px; border-radius: 20px; font-weight: 900; font-size: 0.7rem; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px var(--sky); }
        
        .hand { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .card-v { width: 45px; height: 70px; background: white; color: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid transparent; font-size: 0.9rem; }
        .card-v.red { color: var(--danger); }
        .card-v.sel { border-color: var(--sky); transform: translateY(-15px); box-shadow: 0 10px 25px var(--sky); }

        .score-in { width: 55px; text-align: center; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px; padding: 6px; }
        .emoji-pop { position: absolute; background: var(--card); border: 1px solid var(--sky); border-radius: 20px; padding: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 1000; bottom: 70px; }
        .hist-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .loader-full { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="heartbeat" class="heartbeat"></div>
<div id="loader" class="loader-full"><p style="font-weight:bold; color:var(--sky);">SINCRONIZANDO MESA...</p></div>

<div class="container">
    <h1>Karioka Pro Ultimate</h1>

    <div class="mode-selector">
        <button id="btnF" class="mode-btn active" onclick="setMode('fisico')">MÉTODO FÍSICO (KPI)</button>
        <button id="btnO" class="mode-btn" onclick="setMode('online')">MÉTODO ONLINE (LIVE)</button>
    </div>

    <div id="panelO" class="card" style="display:none;">
        <div id="loginO">
            <input type="text" id="salaId" placeholder="ID de Sala" style="margin-bottom:10px;">
            <button class="btn-sky" style="width:100%; padding:12px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;" onclick="conectarS()">Unirse a Partida</button>
            <div id="whoAmI" style="display:none; margin-top:20px; text-align:center;">
                <p style="font-size:0.8rem; color:var(--sky); margin-bottom:10px;">Selecciona quién eres en la mesa:</p>
                <div id="playerOptions" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;"></div>
            </div>
        </div>

        <div id="mesaO" style="display:none;">
            <div class="mesa">
                <div id="txtTurn" class="turn-badge">TURNO: --</div>
                <div style="display:flex; justify-content:center; gap:30px; margin-bottom:15px;">
                    <div onclick="play('robar_mazo')" style="width:65px; height:95px; border:2px dashed var(--sky); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.65rem;">MAZO</div>
                    <div id="pozoCard" onclick="play('robar_pozo')" style="width:65px; height:95px; background:white; color:#000; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.3rem;">--</div>
                </div>
                <div id="manoContainer" class="hand"></div>
            </div>
            <button id="btnTirar" class="btn-success" style="width:100%; padding:12px; border-radius:10px; border:none; font-weight:bold; display:none;" onclick="play('tirar')">TIRAR CARTA SELECCIONADA</button>
            <p id="logO" style="font-size:0.65rem; color:var(--sky); text-align:center; margin-top:10px; font-style:italic;"></p>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="font-size:0.8rem; color:var(--accent); margin:0;">MESA DE PUNTAJES</h2>
            <button id="btnControl" onclick="controlPartida()">Iniciar Partida</button>
        </div>
        <div id="chipsContainer"></div>
        <div id="zonaTabla" style="display:none; margin-top:20px; overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse; font-size:0.75rem; text-align:center;">
                <thead id="tHead"></thead>
                <tbody id="tBody"></tbody>
                <tfoot id="tFoot" style="font-weight:bold; color:var(--sky);"></tfoot>
            </table>
        </div>
    </div>

    <div class="card" style="position:relative;">
        <h2 style="font-size:0.8rem; color:var(--sky); margin-top:0;">PERFILES</h2>
        <div style="display:flex; gap:10px;">
            <div id="emojiBtn" onclick="tE()" style="background:#334155; padding:10px; border-radius:10px; cursor:pointer; font-size:1.5rem;">👤</div>
            <input type="text" id="nameIn" placeholder="Nombre...">
            <button onclick="addP()">Añadir</button>
        </div>
        <div id="emojiPop" class="emoji-pop">
            <div onclick="setE('👤')">👤</div><div onclick="setE('🦁')">🦁</div><div onclick="setE('🥷')">🥷</div><div onclick="setE('🤖')">🤖</div><div onclick="setE('🦄')">🦄</div>
            <div onclick="setE('🔥')">🔥</div><div onclick="setE('💎')">💎</div><div onclick="setE('🦊')">🦊</div><div onclick="setE('🐯')">🐯</div><div onclick="setE('🍀')">🍀</div>
        </div>
        <div id="listaTodos" style="margin-top:15px; opacity:0.6; display:flex; gap:5px; flex-wrap:wrap;"></div>
    </div>

    <details class="card">
        <summary style="cursor:pointer; color:var(--accent); font-weight:bold;">ESTADÍSTICAS Y AUDITORÍA</summary>
        <div style="height:220px; margin-top:15px;"><canvas id="chart"></canvas></div>
        <div id="histList" style="margin-top:15px;"></div>
    </details>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];

    let state = { modo: 'fisico', jugadores: [], seleccionados: [], activo: false, ts: null, emoji: '👤', sala: null, me: null, selC: null, poll: null };

    window.onload = init;

    async function init() {
        showL(true);
        const r = await fetch(API);
        const d = await r.json();
        state.jugadores = d.jugadores || [];
        renderChips();
        renderHist(d.historial);
        renderChart(d.jugadores);
        showL(false);
    }

    function setMode(m) {
        state.modo = m;
        document.getElementById('btnF').classList.toggle('active', m==='fisico');
        document.getElementById('btnO').classList.toggle('active', m==='online');
        document.getElementById('panelO').style.display = m==='online' ? 'block' : 'none';
        if(m === 'fisico') clearInterval(state.poll);
    }

    async function conectarS() {
        const id = document.getElementById('salaId').value;
        if(!id) return alert("Escribe el ID de sala");
        showL(true);
        const r = await fetch(`${API}?salaId=${id}`);
        const d = await r.json();
        if(d.error) { alert("Sala no encontrada"); showL(false); return; }
        
        state.sala = id;
        document.getElementById('whoAmI').style.display = 'block';
        const opt = document.getElementById('playerOptions');
        opt.innerHTML = '';
        d.game.jugadores.forEach(p => {
            const b = document.createElement('button');
            b.style.cssText = "background:#334155; color:#fff; border:none; padding:8px 15px; border-radius:15px; cursor:pointer;";
            b.innerText = p;
            b.onclick = () => { state.me = p; startOnlineSync(); };
            opt.appendChild(b);
        });
        showL(false);
    }

    function startOnlineSync() {
        document.getElementById('loginO').style.display = 'none';
        document.getElementById('mesaO').style.display = 'block';
        document.getElementById('zonaTabla').style.display = 'block';
        state.poll = setInterval(sync, 4000);
        sync();
    }

    async function sync() {
        document.getElementById('heartbeat').style.display = 'block';
        try {
            const r = await fetch(`${API}?salaId=${state.sala}`);
            const d = await r.json();
            const g = d.game;
            const isMyTurn = g.jugadores[g.turno] === state.me;
            
            document.getElementById('txtTurn').innerText = `TURNO: ${g.jugadores[g.turno]} ${isMyTurn ? '(TUYO)' : ''}`;
            document.getElementById('logO').innerText = g.log;
            
            const pCard = document.getElementById('pozoCard');
            pCard.innerText = g.pozo[0];
            pCard.style.color = (g.pozo[0].includes('♥')||g.pozo[0].includes('♦')) ? 'var(--danger)' : '#000';

            const handZ = document.getElementById('manoContainer');
            handZ.innerHTML = '';
            (g.manos[state.me] || []).forEach(c => {
                const dv = document.createElement('div');
                dv.className = `card-v ${state.selC === c ? 'sel' : ''} ${(c.includes('♥')||c.includes('♦')) ? 'red' : ''}`;
                dv.innerText = c;
                dv.onclick = () => { if(isMyTurn && g.fase === 'tirar') { state.selC = c; sync(); } };
                handZ.appendChild(dv);
            });
            document.getElementById('btnTirar').style.display = (isMyTurn && g.fase === 'tirar' && state.selC) ? 'block' : 'none';
            
            // Actualizar tabla de puntos online
            state.seleccionados = d.jugadores;
            renderTablaFisica(d.puntos);
        } catch(e) {}
        setTimeout(() => document.getElementById('heartbeat').style.display = 'none', 500);
    }

    async function play(tipo) {
        document.getElementById('heartbeat').style.backgroundColor = 'var(--sky)';
        document.getElementById('heartbeat').style.display = 'block';
        await fetch(API, { method: 'POST', body: JSON.stringify({ accion: "accion_juego", salaId: state.sala, tipo, user: state.me, carta: state.selC }), headers: {"Content-Type":"text/plain"} });
        state.selC = null;
        await sync();
    }

    // FISICO
    function controlPartida() {
        if(!state.activo) {
            if(state.seleccionados.length < 2) return alert("Selecciona jugadores arriba");
            state.activo = true; state.ts = Date.now();
            document.getElementById('btnControl').innerText = "Finalizar y Guardar";
            document.getElementById('btnControl').style.background = 'var(--danger)';
            document.getElementById('btnControl').style.color = '#fff';
            document.getElementById('zonaTabla').style.display = 'block';
            renderTablaFisica();
        } else {
            finalizar();
        }
    }

    function renderTablaFisica(ptsCargados = null) {
        document.getElementById('tHead').innerHTML = `<tr><th>Fase</th>${state.seleccionados.map(n => `<th>${n.split(' ')[1]||n}</th>`).join('')}</tr>`;
        document.getElementById('tBody').innerHTML = RONDAS.map((r, ri) => `<tr><td style="text-align:left;">${r}</td>${state.seleccionados.map(n => `<td><input type="number" class="score-in" data-p="${n}" value="${ptsCargados?ptsCargados[n][ri]:0}" oninput="sum()"></td>`).join('')}</tr>`).join('');
        document.getElementById('tFoot').innerHTML = `<tr><td>TOTAL</td>${state.seleccionados.map(n => `<td id="tot_${n}">0</td>`).join('')}</tr>`;
        sum();
    }

    function sum() {
        state.seleccionados.forEach(n => {
            let t = 0;
            document.querySelectorAll(`[data-p="${n}"]`).forEach(i => t += (parseInt(i.value)||0));
            document.getElementById(`tot_${n}`).innerText = t;
        });
    }

    async function finalizar() {
        let r = state.seleccionados.map(n => ({ n, s: parseInt(document.getElementById(`tot_${n}`).innerText) })).sort((a,b)=>a.s - b.s);
        if(!confirm(`Ganador: ${r[0].n}. ¿Guardar resultados?`)) return;
        showL(true);
        let tabla = { jugadores: state.seleccionados, rondas: RONDAS, puntos: {} };
        state.seleccionados.forEach(n => tabla.puntos[n] = Array.from(document.querySelectorAll(`[data-p="${n}"]`)).map(i => parseInt(i.value)||0));
        await fetch(API, { method: 'POST', body: JSON.stringify({
            accion: "guardar_juego", tsInicio: state.ts, tsFin: Date.now(), fecha: new Date().toLocaleDateString(),
            inicio: new Date(state.ts).toLocaleTimeString(), fin: new Date().toLocaleTimeString(),
            ganador: r[0].n, perdedores: r.slice(1).map(x => x.n), puntaje: r[0].s, tabla
        }), headers: {"Content-Type":"text/plain"} });
        location.reload();
    }

    // HELPERS
    function renderChips() {
        const c = document.getElementById('chipsContainer');
        c.innerHTML = '';
        state.jugadores.forEach(j => {
            const d = document.createElement('div');
            d.className = `chip ${state.seleccionados.includes(j.nombre) ? 'active' : ''}`;
            d.innerHTML = j.nombre;
            d.onclick = () => { if(!state.activo) { if(state.seleccionados.includes(j.nombre)) state.seleccionados = state.seleccionados.filter(x => x!==j.nombre); else state.seleccionados.push(j.nombre); renderChips(); } };
            c.appendChild(d);
        });
        const l = document.getElementById('listaTodos');
        l.innerHTML = state.jugadores.map(j => `<div class="chip" style="opacity:0.5;">${j.nombre} ✏️</div>`).join('');
    }
    function tE() { const p = document.getElementById('emojiPop'); p.style.display = (p.style.display==='grid')?'none':'grid'; }
    function setE(e) { state.emoji = e; document.getElementById('emojiBtn').innerText = e; tE(); }
    async function addP() {
        const n = document.getElementById('nameIn').value; if(!n) return;
        showL(true);
        await fetch(API, { method:'POST', body: JSON.stringify({ accion:"nuevo_jugador", nombre: state.emoji+" "+n }), headers:{"Content-Type":"text/plain"} });
        location.reload();
    }
    function showL(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function renderChart(j) { /* Lógica de Chart.js */ }
    function renderHist(h) {
        const z = document.getElementById('histList');
        if(!h || h.length === 0) { z.innerHTML = "<p style='text-align:center; opacity:0.5;'>Sin datos.</p>"; return; }
        z.innerHTML = h.map((x, i) => `
            <div class="hist-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--success); font-weight:bold;">🏆 ${x.ganador}</span>
                    <span style="font-size:0.7rem; color:var(--sky);">${x.puntaje} pts | ⏱ ${x.duracion}</span>
                </div>
                <p style="font-size:0.6rem; opacity:0.5; margin:5px 0;">${x.fecha} | ${x.inicio} - ${x.fin}</p>
            </div>
        `).join('');
    }
</script>
</body>
</html>

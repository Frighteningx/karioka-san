<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • v10 Complete Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #22c55e; --sky: #38bdf8; --text: #f8fafc; --danger: #ef4444; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 10px; padding-bottom: 80px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        .sync-bar { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: transparent; z-index: 9999; }
        .sync-active { background: var(--sky); animation: pulse 2s infinite; width: 100%; }
        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        .card { background: var(--card); border-radius: 20px; padding: 22px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        h1 { text-align: center; background: linear-gradient(90deg, #38bdf8, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; margin: 15px 0; }
        
        .mode-selector { display: flex; background: #0b1120; padding: 5px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .mode-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: transparent; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: var(--accent); color: #000; }

        button { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        button:disabled { opacity: 0.3; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 14px; border-radius: 10px; width: 100%; outline: none; }
        
        .chip { display: inline-flex; align-items: center; gap: 8px; background: #334155; padding: 10px 18px; border-radius: 30px; cursor: pointer; margin: 5px; border: 1px solid transparent; }
        .chip.active { border-color: var(--sky); background: rgba(56, 189, 248, 0.15); color: var(--sky); font-weight: bold; }
        
        .table-wrap { overflow-x: auto; margin-top: 15px; border-radius: 12px; background: #0b1120; border: 1px solid var(--border); }
        .k-table { width: 100%; border-collapse: collapse; min-width: 500px; text-align: center; }
        .k-table th, .k-table td { padding: 12px; border-bottom: 1px solid #334155; }
        .score-in { width: 55px; text-align: center; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px; padding: 6px; }

        .mesa { background: radial-gradient(circle, #1e3a8a 0%, #020617 100%); border-radius: 40px; padding: 25px; border: 1px solid var(--sky); position: relative; margin: 15px 0; }
        .hand { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .card-v { width: 45px; height: 65px; background: white; color: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid transparent; }
        .card-v.red { color: var(--danger); }
        .card-v.sel { border-color: var(--sky); transform: translateY(-10px); box-shadow: 0 10px 20px var(--sky); }

        .emoji-pop { position: absolute; background: var(--card); border: 1px solid var(--sky); border-radius: 20px; padding: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 1000; bottom: 70px; left: 0; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .hist-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .hist-winner-btn { background: transparent; color: var(--accent); font-weight: bold; border: none; cursor: pointer; text-decoration: underline; }
        .loader-full { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="syncBar" class="sync-bar"></div>
<div id="loader" class="loader-full"><p>Procesando...</p></div>

<div class="container">
    <h1>Karioka Pro Ultimate</h1>

    <div class="mode-selector">
        <button id="btnF" class="mode-btn active" onclick="setM('fisico')">MODO FÍSICO</button>
        <button id="btnO" class="mode-btn" onclick="setM('online')">MODO ONLINE</button>
    </div>

    <div id="panelO" class="card" style="display:none;">
        <input type="text" id="salaId" placeholder="ID Sala" style="margin-bottom:10px;">
        <div style="display:flex; gap:10px;">
            <button onclick="crearS()" style="flex:1;">Crear Sala</button>
            <button onclick="unirseS()" style="flex:1; background:var(--card); color:var(--sky); border:1px solid var(--sky);">Unirse</button>
        </div>
        <div id="mesaOnline" style="display:none; margin-top:20px;">
             <div class="mesa">
                <div id="txtTurno" style="text-align:center; font-weight:bold; color:var(--sky); margin-bottom:10px;">TURNO: --</div>
                <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px;">
                    <div onclick="accion('robar')" style="width:60px; height:85px; border:2px dashed var(--sky); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.7rem;">MAZO</div>
                    <div id="pCard" onclick="accion('robar_pozo')" style="width:60px; height:85px; background:white; color:#000; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.2rem;">--</div>
                </div>
                <div id="miMano" class="hand"></div>
             </div>
             <button id="btnT" onclick="accion('tirar')" style="width:100%; background:var(--danger); color:#fff; display:none; margin-top:10px;">TIRAR SELECCIONADA</button>
             <div id="logO" style="font-size:0.7rem; color:var(--sky); text-align:center; margin-top:10px; font-style:italic;"></div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="titleT" style="font-size:0.8rem; color:var(--accent); margin:0;">MESA DE PUNTAJES</h2>
            <button id="btnMain" onclick="controlP()">Iniciar Partida</button>
        </div>
        <div id="chipsP" style="margin-top:15px;"></div>
        <div id="zonaT" style="display:none; margin-top:20px;">
            <div class="table-wrap">
                <table class="k-table">
                    <thead id="tHead"></thead>
                    <tbody id="tBody"></tbody>
                    <tfoot id="tFoot" style="color:var(--accent); font-weight:bold;"></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div class="card" style="position:relative;">
        <h2 style="font-size:0.8rem; color:var(--sky); margin-top:0;">PERFILES</h2>
        <div style="display:flex; gap:10px;">
            <div id="emojiB" onclick="toggleE()" style="background:#334155; padding:10px; border-radius:10px; cursor:pointer; font-size:1.5rem;">👤</div>
            <input type="text" id="nameIn" placeholder="Nombre...">
            <button onclick="addP()">Añadir</button>
        </div>
        <div id="emojiW" class="emoji-pop">
            <div onclick="setE('👤')">👤</div><div onclick="setE('🦁')">🦁</div><div onclick="setE('🥷')">🥷</div><div onclick="setE('🤖')">🤖</div><div onclick="setE('🦊')">🦊</div>
            <div onclick="setE('🐯')">🐯</div><div onclick="setE('🦄')">🦄</div><div onclick="setE('💎')">💎</div><div onclick="setE('🔥')">🔥</div><div onclick="setE('🍀')">🍀</div>
        </div>
        <div id="listaT" style="margin-top:15px;"></div>
    </div>

    <div class="card">
        <h2 style="font-size:0.8rem; color:var(--accent); margin-top:0;">KPI RANKING</h2>
        <div style="height:200px;"><canvas id="chart"></canvas></div>
    </div>

    <details class="card">
        <summary style="cursor:pointer; color:var(--accent); font-weight:bold;">AUDITORÍA HISTÓRICA</summary>
        <div id="histList" style="margin-top:15px;"></div>
    </details>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];
    
    let st = { modo: 'fisico', jugadores: [], seleccionados: [], sala: null, user: "", selC: null, activo: false, ts: null, emoji: "👤", polling: null };
    let myChart = null;

    window.onload = init;

    async function init() {
        showL(true);
        const r = await fetch(API_URL);
        const d = await r.json();
        st.jugadores = d.jugadores || [];
        render();
        renderChart(d.jugadores);
        renderHist(d.historial);
        showL(false);
    }

    function setM(m) {
        st.modo = m;
        document.getElementById('btnF').classList.toggle('active', m==='fisico');
        document.getElementById('btnO').classList.toggle('active', m==='online');
        document.getElementById('panelO').style.display = m==='online' ? 'block' : 'none';
        if(m==='fisico') clearInterval(st.polling);
    }

    function render() {
        const pZ = document.getElementById('chipsP');
        const lZ = document.getElementById('listaT');
        pZ.innerHTML = ''; lZ.innerHTML = '';
        st.jugadores.forEach(j => {
            const c = document.createElement('div');
            c.className = `chip ${st.seleccionados.includes(j.nombre) ? 'active' : ''}`;
            c.innerHTML = j.nombre;
            c.onclick = () => { if(!st.activo) toggleP(j.nombre); };
            pZ.appendChild(c);
            const i = document.createElement('div');
            i.className = 'chip'; i.style.opacity='0.6'; i.innerHTML = j.nombre + " ✏️";
            lZ.appendChild(i);
        });
    }

    function toggleP(n) {
        if(st.seleccionados.includes(n)) st.seleccionados = st.seleccionados.filter(x => x!==n);
        else st.seleccionados.push(n);
        render();
    }

    // LÓGICA FÍSICA
    function controlP() {
        if(!st.activo) {
            if(st.seleccionados.length < 2) return alert("Selecciona jugadores.");
            st.activo = true; st.ts = Date.now();
            document.getElementById('btnMain').innerText = "Finalizar y Guardar";
            document.getElementById('btnMain').style.background = "var(--danger)";
            document.getElementById('zonaT').style.display = 'block';
            updateT();
        } else {
            finalizarF();
        }
    }

    function updateT(ptsCargados = null) {
        document.getElementById('tHead').innerHTML = `<tr><th>Ronda</th>${st.seleccionados.map(n => `<th>${n.split(' ')[1]||n}</th>`).join('')}</tr>`;
        document.getElementById('tBody').innerHTML = RONDAS.map((r, ri) => `<tr><td style="text-align:left;">${r}</td>${st.seleccionados.map(n => `<td><input type="number" class="score-in" data-p="${n}" value="${ptsCargados ? ptsCargados[n][ri] : 0}" oninput="sum()"></td>`).join('')}</tr>`).join('');
        document.getElementById('tFoot').innerHTML = `<td>TOTAL</td>${st.seleccionados.map(n => `<td id="tot_${n}">0</td>`).join('')}`;
        sum(false);
    }

    function sum(online = true) {
        let current = {};
        st.seleccionados.forEach(n => {
            let t = 0; current[n] = [];
            document.querySelectorAll(`[data-p="${n}"]`).forEach(i => { let v = parseInt(i.value)||0; t += v; current[n].push(v); });
            document.getElementById(`tot_${n}`).innerText = t;
        });
        if(online && st.modo === 'online' && st.user === "Host") {
             fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "actualizar_sala", salaId: st.sala, puntos: current }), headers: {"Content-Type":"text/plain"} });
        }
    }

    // LÓGICA ONLINE
    async function crearS() {
        if(st.seleccionados.length < 2) return alert("Selecciona jugadores arriba.");
        const id = document.getElementById('salaId').value; if(!id) return;
        showL(true);
        st.sala = id; st.user = "Host";
        let pts = {}; st.seleccionados.forEach(n => pts[n] = Array(RONDAS.length).fill(0));
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "crear_sala", salaId: id, host: "Tú", jugadores: st.seleccionados, puntos: pts }), headers: {"Content-Type":"text/plain"} });
        st.activo = true; controlP();
        document.getElementById('mesaOnline').style.display = 'block';
        st.polling = setInterval(sync, 5000);
        showL(false);
    }

    async function unirseS() {
        const id = document.getElementById('salaId').value;
        const nombre = prompt("Nombre exacto:"); if(!id || !nombre) return;
        showL(true);
        st.sala = id; st.user = nombre;
        const r = await fetch(`${API_URL}?salaId=${id}`);
        const d = await r.json();
        if(d.error) { alert("No existe"); showL(false); return; }
        st.seleccionados = d.jugadores; st.activo = true;
        document.getElementById('zonaT').style.display = 'block';
        document.getElementById('mesaOnline').style.display = 'block';
        updateT(d.puntos);
        st.polling = setInterval(sync, 5000);
        showL(false);
    }

    async function sync() {
        document.getElementById('syncBar').classList.add('sync-active');
        const r = await fetch(`${API_URL}?salaId=${st.sala}`);
        const d = await r.json();
        if(!d.error) {
            updateT(d.puntos);
            const g = d.game;
            const miT = g.jugadores[g.turno] === st.user;
            document.getElementById('txtTurno').innerText = "TURNO: " + g.jugadores[g.turno] + (miT ? " (TÚ)" : "");
            document.getElementById('logO').innerText = g.log;
            document.getElementById('pCard').innerText = g.pozo[0];
            const manoContainer = document.getElementById('miMano');
            manoContainer.innerHTML = '';
            (g.manos[st.user] || []).forEach(c => {
                const dv = document.createElement('div');
                dv.className = `card-v ${st.selC === c ? 'sel' : ''} ${(c.includes('♥')||c.includes('♦')) ? 'red' : ''}`;
                dv.innerText = c;
                dv.onclick = () => { if(miT && g.fase === 'tirar') { st.selC = c; sync(); } };
                manoContainer.appendChild(dv);
            });
            document.getElementById('btnT').style.display = (miT && g.fase === 'tirar' && st.selC) ? 'block' : 'none';
        }
        setTimeout(()=>document.getElementById('syncBar').classList.remove('sync-active'), 500);
    }

    async function accion(tipo) {
        showL(true);
        await fetch(API_URL, { method:'POST', body: JSON.stringify({ accion:"accion_juego", salaId: st.sala, tipo, user: st.user, carta: st.selC }), headers:{"Content-Type":"text/plain"} });
        st.selC = null; await sync(); showL(false);
    }

    async function finalizarF() {
        let res = st.seleccionados.map(n => ({ n, s: parseInt(document.getElementById(`tot_${n}`).innerText) })).sort((a,b)=>a.s - b.s);
        if(!confirm(`Ganador: ${res[0].n}. ¿Guardar?`)) return;
        showL(true);
        let tabla = { jugadores: st.seleccionados, rondas: RONDAS, puntos: {} };
        st.seleccionados.forEach(n => tabla.puntos[n] = Array.from(document.querySelectorAll(`[data-p="${n}"]`)).map(i => parseInt(i.value)||0));
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({
            accion: "guardar_juego", tsInicio: st.ts, tsFin: Date.now(), fecha: new Date().toLocaleDateString(),
            inicio: new Date(st.ts).toLocaleTimeString(), fin: new Date().toLocaleTimeString(),
            ganador: res[0].n, perdedores: res.slice(1).map(x => x.n), puntaje: res[0].s, tabla
        }), headers: {"Content-Type":"text/plain"} });
        location.reload();
    }

    // HELPERS
    function toggleE() { const w = document.getElementById('emojiW'); w.style.display = (w.style.display === 'grid') ? 'none' : 'grid'; }
    function setE(e) { st.emoji = e; document.getElementById('emojiB').innerText = e; toggleE(); }
    async function addP() {
        const n = document.getElementById('nameIn').value; if(!n) return;
        showL(true);
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: "nuevo_jugador", nombre: st.emoji + " " + n }), headers: {"Content-Type":"text/plain"} });
        document.getElementById('nameIn').value = ''; init();
    }
    function showL(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function renderChart(jugadores) {
        const ctx = document.getElementById('chart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'bar', data: { labels: jugadores.map(j => j.nombre), datasets: [{ label: 'Victorias', data: jugadores.map(j => j.ganados), backgroundColor: '#22c55e' }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } } });
    }
    function renderHist(historial) {
        const zone = document.getElementById('histList');
        if(!historial || historial.length === 0) { zone.innerHTML = "<p style='text-align:center; opacity:0.5;'>Sin datos.</p>"; return; }
        zone.innerHTML = historial.map((h, i) => `
            <div class="hist-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <button class="hist-winner-btn" onclick="toggleDet(${i})">🏆 ${h.ganador}</button>
                    <div style="text-align:right;">
                        <span style="color:var(--sky); font-weight:bold;">${h.puntaje} pts</span>
                        <div style="font-size:0.6rem; opacity:0.6;">⏱ ${h.duracion}</div>
                    </div>
                </div>
                <div id="det_${i}" style="display:none; margin-top:10px; border-top:1px solid #334155; padding-top:10px;">
                    <p style="font-size:0.65rem; margin-bottom:10px;">${h.fecha} | ${h.inicio} - ${h.fin}</p>
                    <div class="table-wrap"><table class="k-table" style="font-size:0.7rem;">
                        <thead><tr><th>Fase</th>${h.detalles ? h.detalles.jugadores.map(j => `<th>${j.split(' ')[1]||j}</th>`).join('') : ''}</tr></thead>
                        <tbody>${h.detalles ? RONDAS.map((r, ri) => `<tr><td style="text-align:left;">${r}</td>${h.detalles.jugadores.map(j => `<td>${h.detalles.puntos[j][ri]}</td>`).join('')}</tr>`).join('') : ''}</tbody>
                    </table></div>
                </div>
            </div>
        `).join('');
    }
    function toggleDet(i) { const el = document.getElementById(`det_${i}`); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
</script>
</body>
</html>

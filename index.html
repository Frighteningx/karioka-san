<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • Auditoría Detallada</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
            --border: rgba(255,255,255,0.1);
        }

        body {
            margin: 0; padding: 10px; background-color: var(--bg); color: var(--text);
            font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column;
            gap: 20px; padding-bottom: 80px;
        }

        .container { max-width: 800px; margin: 0 auto; width: 100%; }
        h1 { font-size: 2rem; text-align: center; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 30px 0; }

        .card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.3); border: 1px solid var(--border); margin-bottom: 24px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { font-size: 1rem; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 14px; border-radius: 10px; width: 100%; font-size: 1rem; outline: none; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* --- EMOJI PICKER --- */
        .player-form-row { display: flex; gap: 12px; align-items: center; position: relative; }
        .emoji-trigger { background: #334155; min-width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border-radius: 10px; cursor: pointer; border: 1px solid var(--border); }
        .emoji-window { position: absolute; bottom: 60px; left: 0; background: var(--card); border: 1px solid var(--accent); border-radius: 15px; padding: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-height: 250px; overflow-y: auto; }
        .emoji-option { font-size: 1.5rem; padding: 8px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .emoji-option:hover { background: var(--accent-glow); }

        /* --- TABLAS PRINCIPALES --- */
        .table-wrapper { overflow-x: auto; border-radius: 12px; background: #0b1120; padding: 12px; border: 1px solid var(--border); }
        .karioka-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .karioka-table th { padding: 12px; font-size: 0.75rem; color: var(--text-dim); border-bottom: 2px solid #334155; text-transform: uppercase; }
        .ronda-name { text-align: left; font-size: 0.85rem; color: var(--text); width: 160px; }
        .score-input { width: 60px !important; text-align: center; padding: 8px !important; background: #1e293b !important; color: white; border: 1px solid #334155; border-radius: 6px; }

        /* --- HISTORIAL Y TABLAS DETALLADAS (LA CORRECCIÓN) --- */
        details summary { padding: 15px; background: var(--card); border-radius: 12px; cursor: pointer; font-weight: bold; color: var(--accent); border: 1px solid var(--border); outline: none; }
        .history-content { background: #0f172a; padding: 15px; border-radius: 0 0 12px 12px; border: 1px solid var(--border); border-top: none; }
        .history-card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 20px; border-left: 5px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .history-card.winner-highlight { border-left-color: var(--success); }
        
        .mini-table-container { margin-top: 15px; overflow-x: auto; border-radius: 8px; border: 1px solid #334155; background: #0b1120; }
        .mini-table { width: 100%; font-size: 0.8rem; border-collapse: collapse; color: var(--text); }
        .mini-table th, .mini-table td { border: 1px solid #334155; padding: 10px 8px; text-align: center; }
        .mini-table th { background: #1e293b; color: var(--text-dim); font-size: 0.7rem; }
        .mini-table .win-col { background: rgba(16, 185, 129, 0.15) !important; color: var(--success); font-weight: bold; }
        .mini-table tr:nth-child(even) { background: rgba(255,255,255,0.02); }

        .loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .player-chip { display: inline-flex; align-items: center; gap: 8px; background: #1e293b; padding: 8px 15px; border-radius: 20px; cursor: pointer; border: 1px solid #334155; font-size: 0.9rem; }
        .player-chip.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
    </style>
</head>
<body>

<div id="globalLoader" class="loader">
    <div style="text-align:center;">
        <div style="border: 4px solid var(--accent); border-top: 4px solid transparent; width: 45px; height: 45px; border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto;"></div>
        <p style="margin-top:15px; font-weight: 600;">Sincronizando la mesa...</p>
    </div>
</div>

<div class="container">
    <h1>Karioka Pro</h1>

    <div class="card">
        <div class="header-row">
            <h2>Partida en Vivo</h2>
            <button onclick="finalizarJuego()" style="background: var(--success); color: white;">Finalizar y Guardar</button>
        </div>
        <div id="chipsContainer" class="player-list" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
        <div id="gameZone" style="display:none; margin-top:20px;">
            <div class="table-wrapper">
                <table class="karioka-table">
                    <thead><tr id="tableHeader"></tr></thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot><tr id="tableFooter" class="total-row" style="color:var(--accent); font-weight:bold; font-size:1.2rem; background: rgba(56, 189, 248, 0.05);"></tr></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header-row">
            <h2 id="playerActionTitle">Gestión de Jugadores</h2>
            <button id="cancelEditBtn" style="display:none; background: var(--danger); color: white;" onclick="resetPlayerForm()">X</button>
        </div>
        <div class="player-form-row">
            <div class="emoji-trigger" id="currentEmoji" onclick="toggleEmojiWindow()">👤</div>
            <div class="emoji-window" id="emojiWindow">
                <div class="emoji-option" onclick="selectEmoji('👤')">👤</div><div class="emoji-option" onclick="selectEmoji('🤴')">🤴</div>
                <div class="emoji-option" onclick="selectEmoji('🥷')">🥷</div><div class="emoji-option" onclick="selectEmoji('🤡')">🤡</div>
                <div class="emoji-option" onclick="selectEmoji('👽')">👽</div><div class="emoji-option" onclick="selectEmoji('🤖')">🤖</div>
                <div class="emoji-option" onclick="selectEmoji('🦁')">🦁</div><div class="emoji-option" onclick="selectEmoji('🦄')">🦄</div>
                <div class="emoji-option" onclick="selectEmoji('🔥')">🔥</div><div class="emoji-option" onclick="selectEmoji('💎')">💎</div>
                <div class="emoji-option" onclick="selectEmoji('🍀')">🍀</div><div class="emoji-option" onclick="selectEmoji('🦊')">🦊</div>
            </div>
            <input type="text" id="playerName" placeholder="Nombre...">
            <button id="playerMainBtn" onclick="savePlayer()">Añadir</button>
        </div>
        <div id="registeredPlayersList" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:20px;"></div>
    </div>

    <div class="card">
        <h2>Ranking Histórico</h2>
        <div style="height: 280px;"><canvas id="statsChart"></canvas></div>
    </div>

    <details>
        <summary>Historial de Partidas Completas</summary>
        <div class="history-content" id="historyList">
            <p style="color: var(--text-dim); text-align: center; padding: 20px;">No hay datos para mostrar.</p>
        </div>
    </details>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];
    
    let jugadores = [];
    let historial = [];
    let seleccionados = [];
    let currentEmoji = '👤';
    let editingOldName = null;
    let chart = null;
    let fechaInicioPartida = null;

    window.onload = loadData;

    function toggleEmojiWindow() {
        const win = document.getElementById('emojiWindow');
        win.style.display = (win.style.display === 'grid') ? 'none' : 'grid';
    }

    function selectEmoji(e) {
        currentEmoji = e;
        document.getElementById('currentEmoji').innerText = e;
        document.getElementById('emojiWindow').style.display = 'none';
    }

    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            jugadores = data.jugadores || [];
            historial = data.historial || [];
            renderPlayers();
            renderStats();
            renderHistory();
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    function renderPlayers() {
        const chips = document.getElementById('chipsContainer');
        const list = document.getElementById('registeredPlayersList');
        chips.innerHTML = ''; list.innerHTML = '';
        jugadores.forEach(j => {
            const chip = document.createElement('div');
            chip.className = `player-chip ${seleccionados.includes(j.nombre) ? 'active' : ''}`;
            chip.innerHTML = j.nombre;
            chip.onclick = () => togglePlayer(j.nombre);
            chips.appendChild(chip);

            const item = document.createElement('div');
            item.className = 'player-chip';
            item.innerHTML = `${j.nombre} <span onclick="startEdit('${j.nombre}')" style="cursor:pointer; opacity:0.6;">✏️</span>`;
            list.appendChild(item);
        });
        updateGameTable();
    }

    function togglePlayer(name) {
        if (seleccionados.includes(name)) {
            seleccionados = seleccionados.filter(n => n !== name);
        } else {
            if (seleccionados.length === 0) fechaInicioPartida = new Date().toLocaleString();
            seleccionados.push(name);
        }
        renderPlayers();
    }

    function updateGameTable() {
        const zone = document.getElementById('gameZone');
        if (seleccionados.length === 0) { zone.style.display = 'none'; return; }
        zone.style.display = 'block';
        document.getElementById('tableHeader').innerHTML = '<th>Ronda</th>' + seleccionados.map(n => `<th>${n.split(' ')[1] || n}</th>`).join('');
        document.getElementById('tableBody').innerHTML = RONDAS.map((r, ri) => `<tr><td class="ronda-name">${r}</td>${seleccionados.map(n => `<td><input type="number" class="score-input" data-player="${n}" data-ronda="${ri}" oninput="calcTotal()"></td>`).join('')}</tr>`).join('');
        document.getElementById('tableFooter').innerHTML = '<td>TOTAL</td>' + seleccionados.map(n => `<td id="total_${n}">0</td>`).join('');
    }

    function calcTotal() {
        seleccionados.forEach(n => {
            let t = 0;
            document.querySelectorAll(`.score-input[data-player="${n}"]`).forEach(i => t += (parseInt(i.value) || 0));
            document.getElementById(`total_${n}`).innerText = t;
        });
    }

    async function savePlayer() {
        const name = document.getElementById('playerName').value.trim();
        if(!name) return;
        showLoader(true);
        const full = currentEmoji + " " + name;
        const payload = editingOldName ? { accion: "editar_jugador", nombreViejo: editingOldName, nombreNuevo: full } : { accion: "nuevo_jugador", nombre: full };
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        resetPlayerForm();
        await loadData();
    }

    async function finalizarJuego() {
        if(seleccionados.length < 2) return;
        let tablaCompleta = { rondas: RONDAS, jugadores: seleccionados, puntos: {} };
        seleccionados.forEach(n => {
            tablaCompleta.puntos[n] = [];
            document.querySelectorAll(`.score-input[data-player="${n}"]`).forEach(input => {
                tablaCompleta.puntos[n].push(parseInt(input.value) || 0);
            });
        });
        let res = seleccionados.map(n => ({ nombre: n, score: parseInt(document.getElementById(`total_${n}`).innerText) })).sort((a,b) => a.score - b.score);
        if(!confirm(`🏆 El ganador es ${res[0].nombre}. ¿Guardar juego completo?`)) return;
        showLoader(true);
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                accion: "guardar_juego",
                fechaInicio: fechaInicioPartida,
                fechaFin: new Date().toLocaleString(),
                ganador: res[0].nombre,
                perdedores: res.slice(1).map(r => r.nombre),
                puntajeGanador: res[0].score,
                tablaCompleta: tablaCompleta 
            })
        });
        seleccionados = [];
        await loadData();
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        if (historial.length === 0) return;

        container.innerHTML = historial.map(h => {
            let miniTable = '';
            if(h.detalles) {
                miniTable = `<div class="mini-table-container"><table class="mini-table"><thead><tr><th>Fase</th>`;
                h.detalles.jugadores.forEach(j => {
                    miniTable += `<th class="${j === h.ganador ? 'win-col' : ''}">${j.split(' ')[1] || j}</th>`;
                });
                miniTable += `</tr></thead><tbody>`;
                h.detalles.rondas.forEach((r, ri) => {
                    miniTable += `<tr><td style="text-align:left; color:var(--text-dim); font-size:0.7rem;">${r}</td>`;
                    h.detalles.jugadores.forEach(j => {
                        miniTable += `<td class="${j === h.ganador ? 'win-col' : ''}">${h.detalles.puntos[j][ri]}</td>`;
                    });
                    miniTable += `</tr>`;
                });
                miniTable += `<tr style="font-weight:bold; background: rgba(56, 189, 248, 0.05);"><td>TOTAL</td>`;
                h.detalles.jugadores.forEach(j => {
                    const totalJ = h.detalles.puntos[j].reduce((a,b) => a+b, 0);
                    miniTable += `<td class="${j === h.ganador ? 'win-col' : ''}">${totalJ}</td>`;
                });
                miniTable += `</tr></tbody></table></div>`;
            } else {
                miniTable = `<p style="font-size:0.7rem; color:var(--danger); margin-top:10px;">Sin detalles (Juego antiguo)</p>`;
            }

            return `
                <div class="history-card ${h.ganador ? 'winner-highlight' : ''}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong style="color:var(--success); font-size:1.1rem;">🏆 ${h.ganador}</strong>
                        <span style="background:var(--accent-glow); color:var(--accent); padding:4px 10px; border-radius:8px; font-size:0.8rem; font-weight:bold;">${h.puntaje} pts</span>
                    </div>
                    <div style="font-size: 0.7rem; color: var(--text-dim); margin: 8px 0; display:flex; justify-content:space-between;">
                        <span>⏱ ${h.duracion}</span>
                        <span>${h.fin}</span>
                    </div>
                    ${miniTable}
                </div>
            `;
        }).join('');
    }

    function renderStats() {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: jugadores.map(j => j.nombre),
                datasets: [
                    { label: 'Wins', data: jugadores.map(j => j.ganados), backgroundColor: '#10b981', borderRadius: 4 },
                    { label: 'Losses', data: jugadores.map(j => j.perdidos), backgroundColor: '#f43f5e', borderRadius: 4 }
                ]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#f1f5f9' } } }, scales: { y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }, x: { stacked: true, grid: { display: false }, ticks: { color: '#f1f5f9' } } } }
        });
    }

    function startEdit(n) { editingOldName = n; document.getElementById('playerName').value = n.split(' ')[1] || n; document.getElementById('playerActionTitle').innerText = "Editando..."; document.getElementById('cancelEditBtn').style.display = "block"; window.scrollTo({ top: 300, behavior: 'smooth' }); }
    function resetPlayerForm() { editingOldName = null; document.getElementById('playerName').value = ""; document.getElementById('playerActionTitle').innerText = "Gestión de Jugadores"; document.getElementById('cancelEditBtn').style.display = "none"; }
    function showLoader(s) { document.getElementById('globalLoader').style.display = s ? 'flex' : 'none'; }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • Dark Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
            --border: rgba(255,255,255,0.08);
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        .container { max-width: 800px; margin: 0 auto; width: 100%; }

        h1 {
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 30px 0;
            letter-spacing: -1px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { font-size: 1.1rem; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 14px;
            border-radius: 10px;
            width: 100%;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active { transform: scale(0.97); }

        /* --- EMOJI PICKER PROFESIONAL --- */
        .player-form-row { display: flex; gap: 12px; align-items: center; position: relative; }

        .emoji-trigger {
            background: #334155;
            min-width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: background 0.2s;
        }

        .emoji-trigger:hover { background: #475569; }

        .emoji-window {
            position: absolute;
            bottom: 60px; /* Aparece arriba del input */
            left: 0;
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 15px;
            padding: 15px;
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .emoji-option {
            font-size: 1.5rem;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
            transition: background 0.2s;
        }

        .emoji-option:hover { background: var(--accent-glow); }
        .emoji-option.selected { background: var(--accent); color: var(--bg); }

        /* --- LISTAS Y CHIPS --- */
        .player-list { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }

        .player-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #1e293b;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            border: 1px solid #334155;
            transition: all 0.2s;
        }

        .player-chip.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); font-weight: bold; }

        .btn-edit { margin-left: 8px; background: transparent; color: var(--text-dim); border: 1px solid #334155; padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; }

        /* --- TABLA --- */
        .table-wrapper { overflow-x: auto; border-radius: 12px; background: #0f172a; padding: 10px; }
        .karioka-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .karioka-table th { padding: 15px 10px; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; border-bottom: 2px solid #334155; }
        .karioka-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .ronda-name { text-align: left; font-weight: 500; font-size: 0.9rem; width: 180px; color: var(--text); }
        .score-input { width: 70px !important; text-align: center; padding: 8px !important; background: #1e293b !important; }
        .total-row { font-weight: 800; color: var(--accent); font-size: 1.3rem; background: rgba(56, 189, 248, 0.05); }

        .loader {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="globalLoader" class="loader">
    <div style="text-align:center;">
        <div style="border: 4px solid var(--accent); border-top: 4px solid transparent; width: 45px; height: 45px; border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto;"></div>
        <p style="margin-top:15px; font-weight: 600;">Sincronizando datos...</p>
    </div>
</div>

<div class="container">
    <h1>Karioka Pro</h1>

    <div class="card">
        <div class="header-row">
            <h2>Partida en Vivo</h2>
            <button onclick="finalizarJuego()" style="background: var(--success); color: white;">Finalizar Partida</button>
        </div>
        <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 15px;">Selecciona participantes:</p>
        <div id="chipsContainer" class="player-list"></div>
        
        <div id="gameZone" style="display:none;">
            <div class="table-wrapper">
                <table class="karioka-table">
                    <thead><tr id="tableHeader"></tr></thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot><tr id="tableFooter" class="total-row"></tr></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header-row">
            <h2 id="playerActionTitle">Gestión de Jugadores</h2>
            <button id="cancelEditBtn" style="display:none; background: var(--danger); color: white;" onclick="resetPlayerForm()">Cancelar</button>
        </div>

        <div class="player-form-row">
            <div class="emoji-trigger" id="currentEmoji" onclick="toggleEmojiWindow()">👤</div>
            <div class="emoji-window" id="emojiWindow">
                <div class="emoji-option" onclick="selectEmoji('👤')">👤</div>
                <div class="emoji-option" onclick="selectEmoji('🤴')">🤴</div>
                <div class="emoji-option" onclick="selectEmoji('🥷')">🥷</div>
                <div class="emoji-option" onclick="selectEmoji('🤡')">🤡</div>
                <div class="emoji-option" onclick="selectEmoji('👽')">👽</div>
                <div class="emoji-option" onclick="selectEmoji('🤖')">🤖</div>
                <div class="emoji-option" onclick="selectEmoji('👹')">👹</div>
                <div class="emoji-option" onclick="selectEmoji('🌟')">🌟</div>
            </div>
            
            <input type="text" id="playerName" placeholder="Nombre del jugador...">
            <button id="playerMainBtn" onclick="savePlayer()">Añadir</button>
        </div>
        
        <p style="margin-top:25px; font-size: 0.8rem; color: var(--text-dim);">Registrados:</p>
        <div id="registeredPlayersList" class="player-list"></div>
    </div>

    <div class="card">
        <div class="header-row">
            <h2>KPIs de Victoria</h2>
        </div>
        <div style="height: 350px;">
            <canvas id="statsChart"></canvas>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real", "Escala Color"];
    
    let jugadores = [];
    let seleccionados = [];
    let currentEmoji = '👤';
    let editingOldName = null;
    let chart = null;

    window.onload = loadData;

    // --- LÓGICA EMOJI ---
    function toggleEmojiWindow() {
        const win = document.getElementById('emojiWindow');
        win.style.display = (win.style.display === 'grid') ? 'none' : 'grid';
    }

    function selectEmoji(e) {
        currentEmoji = e;
        document.getElementById('currentEmoji').innerText = e;
        document.getElementById('emojiWindow').style.display = 'none';
        
        document.querySelectorAll('.emoji-option').forEach(opt => {
            opt.classList.toggle('selected', opt.innerText === e);
        });
    }

    // Cierra el selector si haces clic afuera
    window.addEventListener('click', (e) => {
        const win = document.getElementById('emojiWindow');
        const trigger = document.getElementById('currentEmoji');
        if (!win.contains(e.target) && e.target !== trigger) {
            win.style.display = 'none';
        }
    });

    // --- LÓGICA DE DATOS ---
    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(API_URL);
            jugadores = await res.json();
            renderPlayers();
            renderStats();
        } catch (e) { alert("Error al conectar con la base de datos."); }
        showLoader(false);
    }

    function renderPlayers() {
        const list = document.getElementById('registeredPlayersList');
        const chips = document.getElementById('chipsContainer');
        list.innerHTML = '';
        chips.innerHTML = '';

        jugadores.forEach(j => {
            const chip = document.createElement('div');
            chip.className = `player-chip ${seleccionados.includes(j.nombre) ? 'active' : ''}`;
            chip.innerHTML = j.nombre;
            chip.onclick = () => togglePlayer(j.nombre);
            chips.appendChild(chip);

            const editBadge = document.createElement('div');
            editBadge.className = 'player-chip';
            editBadge.style.cursor = 'default';
            editBadge.innerHTML = `${j.nombre} <button class="btn-edit" onclick="startEdit('${j.nombre}')">Editar</button>`;
            list.appendChild(editBadge);
        });
        updateGameTable();
    }

    function togglePlayer(name) {
        if (seleccionados.includes(name)) seleccionados = seleccionados.filter(n => n !== name);
        else seleccionados.push(name);
        renderPlayers();
    }

    function updateGameTable() {
        const zone = document.getElementById('gameZone');
        const head = document.getElementById('tableHeader');
        const body = document.getElementById('tableBody');
        const foot = document.getElementById('tableFooter');

        if (seleccionados.length === 0) { zone.style.display = 'none'; return; }
        zone.style.display = 'block';

        head.innerHTML = '<th>Ronda</th>' + seleccionados.map(n => `<th>${n.split(' ')[1] || n}</th>`).join('');
        
        body.innerHTML = RONDAS.map(r => `
            <tr>
                <td class="ronda-name">${r}</td>
                ${seleccionados.map(n => `<td><input type="number" class="score-input" data-player="${n}" oninput="calcTotal()"></td>`).join('')}
            </tr>
        `).join('');

        foot.innerHTML = '<td>TOTAL</td>' + seleccionados.map(n => `<td id="total_${n}">0</td>`).join('');
    }

    function calcTotal() {
        seleccionados.forEach(n => {
            let t = 0;
            document.querySelectorAll(`.score-input[data-player="${n}"]`).forEach(i => t += (parseInt(i.value) || 0));
            document.getElementById(`total_${n}`).innerText = t;
        });
    }

    function startEdit(fullName) {
        editingOldName = fullName;
        const emoji = fullName.substring(0, 2).trim();
        const name = fullName.substring(2).trim();
        document.getElementById('playerName').value = name;
        selectEmoji(emoji || '👤');
        document.getElementById('playerActionTitle').innerText = "Editando Perfil";
        document.getElementById('playerMainBtn').innerText = "Actualizar";
        document.getElementById('cancelEditBtn').style.display = "block";
        window.scrollTo({ top: 400, behavior: 'smooth' });
    }

    function resetPlayerForm() {
        editingOldName = null;
        document.getElementById('playerName').value = "";
        document.getElementById('playerActionTitle').innerText = "Gestión de Jugadores";
        document.getElementById('playerMainBtn').innerText = "Añadir";
        document.getElementById('cancelEditBtn').style.display = "none";
        selectEmoji('👤');
    }

    async function savePlayer() {
        const rawName = document.getElementById('playerName').value.trim();
        if(!rawName) return;
        const newFullName = currentEmoji + " " + rawName;

        showLoader(true);
        const payload = editingOldName 
            ? { accion: "editar_jugador", nombreViejo: editingOldName, nombreNuevo: newFullName }
            : { accion: "nuevo_jugador", nombre: newFullName };

        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        resetPlayerForm();
        await loadData();
    }

    async function finalizarJuego() {
        if(seleccionados.length < 2) return alert("Se requieren al menos 2 jugadores.");
        
        let results = seleccionados.map(n => ({
            nombre: n,
            score: parseInt(document.getElementById(`total_${n}`).innerText)
        })).sort((a,b) => a.score - b.score);

        if(!confirm(`🏆 El ganador es ${results[0].nombre}. ¿Subir resultados a la nube?`)) return;

        showLoader(true);
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                accion: "guardar_juego",
                ganador: results[0].nombre,
                perdedores: results.slice(1).map(r => r.nombre),
                puntajeGanador: results[0].score
            })
        });
        seleccionados = [];
        await loadData();
    }

    function renderStats() {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: jugadores.map(j => j.nombre),
                datasets: [
                    { label: 'Ganados', data: jugadores.map(j => j.ganados), backgroundColor: '#10b981', borderRadius: 5 },
                    { label: 'Perdidos', data: jugadores.map(j => j.perdidos), backgroundColor: '#f43f5e', borderRadius: 5 }
                ]
            },
            options: {
                maintainAspectRatio: false,
                scales: { 
                    y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { stacked: true, grid: { display: false }, ticks: { color: '#f1f5f9' } }
                },
                plugins: { legend: { position: 'top', labels: { color: '#f1f5f9', font: { size: 12, weight: '600' } } } }
            }
        });
    }

    function showLoader(show) { document.getElementById('globalLoader').style.display = show ? 'flex' : 'none'; }
</script>

</body>
</html>

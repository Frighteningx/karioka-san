<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • v4.0 Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
            --border: rgba(255,255,255,0.1);
        }

        body {
            margin: 0; padding: 10px; background-color: var(--bg); color: var(--text);
            font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column;
            gap: 20px; padding-bottom: 80px;
        }

        .container { max-width: 800px; margin: 0 auto; width: 100%; }
        h1 { font-size: 2rem; text-align: center; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 25px 0; letter-spacing: -1px; }

        .card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.3); border: 1px solid var(--border); margin-bottom: 24px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { font-size: 0.9rem; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 1.5px; }

        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 14px; border-radius: 10px; width: 100%; font-size: 1rem; outline: none; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s ease; }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }

        /* --- EMOJI PICKER --- */
        .player-form-row { display: flex; gap: 12px; align-items: center; position: relative; }
        .emoji-trigger { background: #334155; min-width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border-radius: 10px; cursor: pointer; border: 1px solid var(--border); }
        .emoji-window { position: absolute; bottom: 60px; left: 0; background: var(--card); border: 1px solid var(--accent); border-radius: 15px; padding: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-height: 250px; overflow-y: auto; }
        .emoji-option { font-size: 1.5rem; padding: 8px; cursor: pointer; border-radius: 8px; text-align: center; }
        .emoji-option:hover { background: var(--accent-glow); }

        /* --- TABLAS --- */
        .table-wrapper { overflow-x: auto; border-radius: 12px; background: #0b1120; padding: 12px; border: 1px solid var(--border); }
        .karioka-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .karioka-table th { padding: 12px; font-size: 0.7rem; color: var(--text-dim); border-bottom: 1px solid #334155; text-transform: uppercase; }
        .ronda-name { text-align: left; font-size: 0.8rem; color: var(--text); width: 150px; font-weight: 600; }
        .score-input { width: 60px !important; text-align: center; padding: 8px !important; background: #1e293b !important; color: white; border: 1px solid #334155; border-radius: 6px; }

        /* --- HISTORIAL --- */
        details summary { padding: 18px; background: var(--card); border-radius: 12px; cursor: pointer; font-weight: bold; color: var(--accent); border: 1px solid var(--border); outline: none; list-style: none; display: flex; justify-content: space-between; }
        details summary::after { content: '▼'; font-size: 0.7rem; }
        .history-content { background: #0f172a; padding: 15px; border-radius: 0 0 12px 12px; border: 1px solid var(--border); border-top: none; }
        .history-card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 20px; border-left: 5px solid var(--accent); }
        
        .history-winner-btn { background: transparent; color: var(--success); font-size: 1.1rem; padding: 0; border: none; font-weight: 800; cursor: pointer; text-decoration: underline; text-decoration-style: dotted; }
        
        .detalle-tabla { display: none; margin-top: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .mini-table { width: 100%; font-size: 0.75rem; border-collapse: collapse; background: #0b1120; border-radius: 8px; overflow: hidden; }
        .mini-table th, .mini-table td { border: 1px solid #334155; padding: 8px; text-align: center; }
        .mini-table .win-col { background: rgba(16, 185, 129, 0.1) !important; color: var(--success); font-weight: bold; }

        .loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .player-chip { display: inline-flex; align-items: center; gap: 8px; background: #1e293b; padding: 8px 15px; border-radius: 20px; cursor: pointer; border: 1px solid #334155; font-size: 0.9rem; transition: 0.2s; }
        .player-chip.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>

<div id="globalLoader" class="loader">
    <div style="text-align:center;">
        <div style="border: 4px solid var(--accent); border-top: 4px solid transparent; width: 45px; height: 45px; border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto;"></div>
        <p style="margin-top:15px; font-weight: 600; letter-spacing: 1px;">SINCRONIZANDO...</p>
    </div>
</div>

<div class="container">
    <h1>Karioka Pro</h1>

    <div class="card">
        <div class="header-row">
            <h2>Gestión de Partida</h2>
            <button id="mainGameBtn" onclick="gestionarBotonPartida()" style="background: var(--accent); color: var(--bg);">Iniciar Nueva Partida</button>
        </div>
        <p id="msgInstruccion" style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 15px;">Selecciona los jugadores antes de iniciar.</p>
        <div id="chipsContainer" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
        
        <div id="gameZone" style="display:none; margin-top:25px;">
            <div class="table-wrapper">
                <table class="karioka-table">
                    <thead><tr id="tableHeader"></tr></thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot><tr id="tableFooter" style="color:var(--accent); font-weight:800; font-size:1.1rem; background: rgba(56, 189, 248, 0.05);"></tr></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header-row">
            <h2 id="playerActionTitle">Jugadores</h2>
            <button id="cancelEditBtn" style="display:none; background: var(--danger); color: white;" onclick="resetPlayerForm()">Cancelar</button>
        </div>
        <div class="player-form-row">
            <div class="emoji-trigger" id="currentEmoji" onclick="toggleEmojiWindow()">👤</div>
            <div class="emoji-window" id="emojiWindow">
                <div class="emoji-option" onclick="selectEmoji('👤')">👤</div><div class="emoji-option" onclick="selectEmoji('🤴')">🤴</div>
                <div class="emoji-option" onclick="selectEmoji('🥷')">🥷</div><div class="emoji-option" onclick="selectEmoji('🤡')">🤡</div>
                <div class="emoji-option" onclick="selectEmoji('👽')">👽</div><div class="emoji-option" onclick="selectEmoji('🤖')">🤖</div>
                <div class="emoji-option" onclick="selectEmoji('🦁')">🦁</div><div class="emoji-option" onclick="selectEmoji('🦄')">🦄</div>
                <div class="emoji-option" onclick="selectEmoji('🔥')">🔥</div><div class="emoji-option" onclick="selectEmoji('💎')">💎</div>
                <div class="emoji-option" onclick="selectEmoji('🍀')">🍀</div><div class="emoji-option" onclick="selectEmoji('🦊')">🦊</div>
            </div>
            <input type="text" id="playerName" placeholder="Nombre...">
            <button id="playerMainBtn" onclick="savePlayer()">Añadir</button>
        </div>
        <div id="registeredPlayersList" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:20px;"></div>
    </div>

    <div class="card">
        <h2>Estadísticas</h2>
        <div style="height: 280px;"><canvas id="statsChart"></canvas></div>
    </div>

    <details>
        <summary>Historial de Partidas Completadas</summary>
        <div class="history-content" id="historyList"></div>
    </details>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real"];
    
    let jugadores = [];
    let historial = [];
    let seleccionados = [];
    let currentEmoji = '👤';
    let editingOldName = null;
    let chart = null;
    
    // Variables de control de tiempo y estado
    let fechaInicioTS = null;
    let juegoActivo = false;

    window.onload = loadData;

    function toggleEmojiWindow() {
        const win = document.getElementById('emojiWindow');
        win.style.display = (win.style.display === 'grid') ? 'none' : 'grid';
    }

    function selectEmoji(e) {
        currentEmoji = e;
        document.getElementById('currentEmoji').innerText = e;
        document.getElementById('emojiWindow').style.display = 'none';
    }

    function gestionarBotonPartida() {
        const btn = document.getElementById('mainGameBtn');
        if (!juegoActivo) {
            if (seleccionados.length < 2) return alert("Selecciona al menos 2 jugadores para empezar.");
            iniciarPartida();
        } else {
            finalizarJuego();
        }
    }

    function iniciarPartida() {
        juegoActivo = true;
        fechaInicioTS = Date.now(); // Captura numérica exacta
        
        const btn = document.getElementById('mainGameBtn');
        btn.innerText = "Finalizar y Guardar";
        btn.style.background = "var(--success)";
        btn.style.color = "white";

        document.getElementById('msgInstruccion').style.display = 'none';
        document.getElementById('gameZone').style.display = 'block';
        updateGameTable();
    }

    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            jugadores = data.jugadores || [];
            historial = data.historial || [];
            renderPlayers();
            renderStats();
            renderHistory();
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    function renderPlayers() {
        const chips = document.getElementById('chipsContainer');
        const list = document.getElementById('registeredPlayersList');
        chips.innerHTML = ''; list.innerHTML = '';
        jugadores.forEach(j => {
            const chip = document.createElement('div');
            chip.className = `player-chip ${seleccionados.includes(j.nombre) ? 'active' : ''}`;
            chip.innerHTML = j.nombre;
            chip.onclick = () => {
                if(juegoActivo) return alert("No puedes cambiar jugadores con la partida en curso.");
                togglePlayer(j.nombre);
            };
            chips.appendChild(chip);

            const item = document.createElement('div');
            item.className = 'player-chip';
            item.innerHTML = `${j.nombre} <span onclick="startEdit('${j.nombre}')" style="cursor:pointer; opacity:0.6;">✏️</span>`;
            list.appendChild(item);
        });
    }

    function togglePlayer(name) {
        if (seleccionados.includes(name)) seleccionados = seleccionados.filter(n => n !== name);
        else seleccionados.push(name);
        renderPlayers();
    }

    function updateGameTable() {
        document.getElementById('tableHeader').innerHTML = '<th>Ronda</th>' + seleccionados.map(n => `<th>${n.split(' ')[1] || n}</th>`).join('');
        document.getElementById('tableBody').innerHTML = RONDAS.map((r, ri) => `<tr><td class="ronda-name">${r}</td>${seleccionados.map(n => `<td><input type="number" class="score-input" data-player="${n}" oninput="calcTotal()"></td>`).join('')}</tr>`).join('');
        document.getElementById('tableFooter').innerHTML = '<td>TOTAL</td>' + seleccionados.map(n => `<td id="total_${n}">0</td>`).join('');
    }

    function calcTotal() {
        seleccionados.forEach(n => {
            let t = 0;
            document.querySelectorAll(`.score-input[data-player="${n}"]`).forEach(i => t += (parseInt(i.value) || 0));
            document.getElementById(`total_${n}`).innerText = t;
        });
    }

    async function savePlayer() {
        const name = document.getElementById('playerName').value.trim();
        if(!name) return;
        showLoader(true);
        const full = currentEmoji + " " + name;
        const payload = editingOldName ? { accion: "editar_jugador", nombreViejo: editingOldName, nombreNuevo: full } : { accion: "nuevo_jugador", nombre: full };
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        resetPlayerForm();
        await loadData();
    }

    async function finalizarJuego() {
        const res = seleccionados.map(n => ({ nombre: n, score: parseInt(document.getElementById(`total_${n}`).innerText) })).sort((a,b) => a.score - b.score);
        if(!confirm(`🏆 Ganador: ${res[0].nombre}. ¿Guardar juego completo?`)) return;

        showLoader(true);
        const tsFin = Date.now();
        const dFin = new Date(tsFin);
        const dInicio = new Date(fechaInicioTS);

        let tablaCompleta = { rondas: RONDAS, jugadores: seleccionados, puntos: {} };
        seleccionados.forEach(n => {
            tablaCompleta.puntos[n] = [];
            document.querySelectorAll(`.score-input[data-player="${n}"]`).forEach(input => tablaCompleta.puntos[n].push(parseInt(input.value) || 0));
        });

        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                accion: "guardar_juego",
                tsInicio: fechaInicioTS,
                tsFin: tsFin,
                fechaStr: dFin.toLocaleDateString(),
                horaInicioStr: dInicio.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                horaFinStr: dFin.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                ganador: res[0].nombre,
                perdedores: res.slice(1).map(r => r.nombre),
                puntajeGanador: res[0].score,
                tablaCompleta: tablaCompleta 
            })
        });

        // Reset UI
        juegoActivo = false;
        seleccionados = [];
        const btn = document.getElementById('mainGameBtn');
        btn.innerText = "Iniciar Nueva Partida";
        btn.style.background = "var(--accent)";
        document.getElementById('gameZone').style.display = 'none';
        document.getElementById('msgInstruccion').style.display = 'block';
        await loadData();
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        if (historial.length === 0) { container.innerHTML = "<p style='text-align:center; padding:20px; color:var(--text-dim);'>Sin datos.</p>"; return; }

        container.innerHTML = historial.map((h, index) => {
            let miniTable = '';
            if(h.detalles) {
                miniTable = `<div id="detalle_${index}" class="detalle-tabla"><div class="table-wrapper"><table class="mini-table"><thead><tr><th>Ronda</th>`;
                h.detalles.jugadores.forEach(j => { miniTable += `<th class="${j === h.ganador ? 'win-col' : ''}">${j.split(' ')[1] || j}</th>`; });
                miniTable += `</tr></thead><tbody>`;
                h.detalles.rondas.forEach((r, ri) => {
                    miniTable += `<tr><td style="text-align:left; color:var(--text-dim);">${r}</td>`;
                    h.detalles.jugadores.forEach(j => { miniTable += `<td class="${j === h.ganador ? 'win-col' : ''}">${h.detalles.puntos[j][ri]}</td>`; });
                    miniTable += `</tr>`;
                });
                miniTable += `<tr style="font-weight:bold; background: rgba(56, 189, 248, 0.05);"><td>TOTAL</td>`;
                h.detalles.jugadores.forEach(j => {
                    const totalJ = h.detalles.puntos[j].reduce((a,b) => a+b, 0);
                    miniTable += `<td class="${j === h.ganador ? 'win-col' : ''}">${totalJ}</td>`;
                });
                miniTable += `</tr></tbody></table></div></div>`;
            }

            return `
                <div class="history-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <button class="history-winner-btn" onclick="toggleDetalle(${index})">${h.ganador}</button>
                            <div style="font-size: 0.65rem; color: var(--text-dim); margin-top:4px;">
                                📅 ${h.fecha} | 🕒 ${h.inicio} - ${h.fin}
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <span style="color:var(--accent); font-weight:bold; font-size:1rem;">${h.puntaje} pts</span>
                            <div style="font-size:0.65rem; color:var(--success); margin-top:4px;">⏱ ${h.duracion}</div>
                        </div>
                    </div>
                    ${miniTable}
                </div>
            `;
        }).join('');
    }

    function toggleDetalle(idx) {
        const el = document.getElementById(`detalle_${idx}`);
        if(el) el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function renderStats() {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: jugadores.map(j => j.nombre),
                datasets: [
                    { label: 'Wins', data: jugadores.map(j => j.ganados), backgroundColor: '#10b981', borderRadius: 4 },
                    { label: 'Losses', data: jugadores.map(j => j.perdidos), backgroundColor: '#f43f5e', borderRadius: 4 }
                ]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#f1f5f9', font: {size: 10} } } }, scales: { y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }, x: { stacked: true, grid: { display: false }, ticks: { color: '#f1f5f9' } } } }
        });
    }

    function startEdit(n) { 
        if(juegoActivo) return alert("No puedes editar jugadores durante una partida.");
        editingOldName = n; 
        document.getElementById('playerName').value = n.split(' ')[1] || n; 
        document.getElementById('playerActionTitle').innerText = "Editando..."; 
        document.getElementById('cancelEditBtn').style.display = "block"; 
    }
    
    function resetPlayerForm() { editingOldName = null; document.getElementById('playerName').value = ""; document.getElementById('playerActionTitle').innerText = "Jugadores"; document.getElementById('cancelEditBtn').style.display = "none"; }
    function showLoader(s) { document.getElementById('globalLoader').style.display = s ? 'flex' : 'none'; }
</script>
</body>
</html>

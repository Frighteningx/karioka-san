<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karioka Pro • Dark Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 { font-size: 1.2rem; color: var(--accent); margin: 0; }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active { transform: scale(0.98); }

        /* Estilo Tabla Karioka */
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        .karioka-table { width: 100%; border-collapse: collapse; }
        .karioka-table th { padding: 12px; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; }
        .karioka-table td { padding: 8px; border-bottom: 1px solid #334155; }
        .ronda-name { text-align: left; font-size: 0.9rem; font-weight: 600; width: 150px; }
        .score-input { width: 60px !important; text-align: center; padding: 5px !important; }

        /* Emoji Picker */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 10px 0;
        }
        .emoji-btn {
            background: #334155;
            font-size: 1.5rem;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .emoji-btn.selected { border: 2px solid var(--accent); background: var(--accent-glow); }

        .player-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #334155;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .player-chip.active { border-color: var(--accent); background: var(--accent-glow); }

        .btn-edit { font-size: 0.7rem; padding: 4px 8px; background: transparent; color: var(--text-dim); border: 1px solid var(--text-dim); }

        .loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .total-row { font-weight: 900; color: var(--accent); font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="globalLoader" class="loader">
    <div style="text-align:center;">
        <div style="border: 4px solid var(--accent); border-top: 4px solid transparent; width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; margin: auto;"></div>
        <p>Sincronizando la nube...</p>
    </div>
</div>

<div class="container">
    <h1>Karioka Pro Tracker</h1>

    <div class="card">
        <div class="header-row">
            <h2>Juego Actual</h2>
            <button onclick="finalizarJuego()" style="background: var(--success); color: white;">Finalizar</button>
        </div>
        <p style="color: var(--text-dim); font-size: 0.9rem;">Toca los jugadores para incluirlos en la partida:</p>
        <div id="chipsContainer" class="player-list" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;"></div>
        
        <div id="gameZone" style="display:none;">
            <div class="table-wrapper">
                <table class="karioka-table">
                    <thead><tr id="tableHeader"></tr></thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot><tr id="tableFooter" class="total-row"></tr></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header-row">
            <h2 id="playerActionTitle">Nuevo Jugador</h2>
            <button id="cancelEditBtn" style="display:none; background: var(--danger);" onclick="resetPlayerForm()">Cancelar</button>
        </div>
        <div class="emoji-grid">
            <div class="emoji-btn" onclick="selectEmoji('👤')">👤</div>
            <div class="emoji-btn" onclick="selectEmoji('🤴')">🤴</div>
            <div class="emoji-btn" onclick="selectEmoji('🥷')">🥷</div>
            <div class="emoji-btn" onclick="selectEmoji('🤡')">🤡</div>
            <div class="emoji-btn" onclick="selectEmoji('👽')">👽</div>
            <div class="emoji-btn" onclick="selectEmoji('🤖')">🤖</div>
        </div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="playerName" placeholder="Nombre...">
            <button id="playerMainBtn" onclick="savePlayer()">Añadir</button>
        </div>
        
        <div id="registeredPlayersList" style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;"></div>
    </div>

    <div class="card">
        <h2>Estadísticas Globales</h2>
        <div style="height: 300px; margin-top:20px;">
            <canvas id="statsChart"></canvas>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4aXd5BGL_vPhOaOuNgxzqcEEHx0hMHO-I5bP4AIs3BegvmF6Q1L9Ejlrz-Sc2lzO1Uw/exec";
    const RONDAS = ["2 Trios", "1 Trío 1 Escala", "2 Escalas", "3 Trios", "2 Trios 1 Escala", "1 Trío 2 Escalas", "3 Escalas", "4 Trios", "Escala Sucia", "Escala Real", "Escala Color"];
    
    let jugadores = [];
    let seleccionados = [];
    let selectedEmoji = '👤';
    let editingOldName = null;
    let chart = null;

    window.onload = loadData;

    function selectEmoji(e) {
        selectedEmoji = e;
        document.querySelectorAll('.emoji-btn').forEach(b => {
            b.classList.toggle('selected', b.innerText === e);
        });
    }

    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(API_URL);
            jugadores = await res.json();
            renderPlayers();
            renderStats();
        } catch (e) { alert("Error de conexión"); }
        showLoader(false);
    }

    function renderPlayers() {
        const list = document.getElementById('registeredPlayersList');
        const chips = document.getElementById('chipsContainer');
        list.innerHTML = '';
        chips.innerHTML = '';

        jugadores.forEach(j => {
            // Chips para juego
            const chip = document.createElement('div');
            chip.className = `player-chip ${seleccionados.includes(j.nombre) ? 'active' : ''}`;
            chip.innerHTML = j.nombre;
            chip.onclick = () => togglePlayer(j.nombre);
            chips.appendChild(chip);

            // Lista para editar
            const editRow = document.createElement('div');
            editRow.className = 'player-chip';
            editRow.style.cursor = 'default';
            editRow.innerHTML = `${j.nombre} <button class="btn-edit" onclick="startEdit('${j.nombre}')">Edit</button>`;
            list.appendChild(editRow);
        });
        updateGameTable();
    }

    function togglePlayer(name) {
        if (seleccionados.includes(name)) seleccionados = seleccionados.filter(n => n !== name);
        else seleccionados.push(name);
        renderPlayers();
    }

    function updateGameTable() {
        const zone = document.getElementById('gameZone');
        const head = document.getElementById('tableHeader');
        const body = document.getElementById('tableBody');
        const foot = document.getElementById('tableFooter');

        if (seleccionados.length === 0) { zone.style.display = 'none'; return; }
        zone.style.display = 'block';

        head.innerHTML = '<th>Ronda</th>' + seleccionados.map(n => `<th>${n.split(' ')[0]}</th>`).join('');
        
        body.innerHTML = RONDAS.map(r => `
            <tr>
                <td class="ronda-name">${r}</td>
                ${seleccionados.map(n => `<td><input type="number" class="score-input" data-player="${n}" oninput="calcTotal()"></td>`).join('')}
            </tr>
        `).join('');

        foot.innerHTML = '<td>TOTAL</td>' + seleccionados.map(n => `<td id="total_${n}">0</td>`).join('');
    }

    function calcTotal() {
        seleccionados.forEach(n => {
            let t = 0;
            document.querySelectorAll(`.score-input[data-player="${n}"]`).forEach(i => t += (parseInt(i.value) || 0));
            document.getElementById(`total_${n}`).innerText = t;
        });
    }

    function startEdit(fullName) {
        editingOldName = fullName;
        const emoji = fullName.substring(0, 2);
        const name = fullName.substring(2).trim();
        document.getElementById('playerName').value = name;
        selectEmoji(emoji);
        document.getElementById('playerActionTitle').innerText = "Editando Jugador";
        document.getElementById('playerMainBtn').innerText = "Actualizar";
        document.getElementById('cancelEditBtn').style.display = "block";
    }

    function resetPlayerForm() {
        editingOldName = null;
        document.getElementById('playerName').value = "";
        document.getElementById('playerActionTitle').innerText = "Nuevo Jugador";
        document.getElementById('playerMainBtn').innerText = "Añadir";
        document.getElementById('cancelEditBtn').style.display = "none";
        selectEmoji('👤');
    }

    async function savePlayer() {
        const rawName = document.getElementById('playerName').value.trim();
        if(!rawName) return;
        const newFullName = selectedEmoji + " " + rawName;

        showLoader(true);
        const payload = editingOldName 
            ? { accion: "editar_jugador", nombreViejo: editingOldName, nombreNuevo: newFullName }
            : { accion: "nuevo_jugador", nombre: newFullName };

        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        resetPlayerForm();
        await loadData();
    }

    async function finalizarJuego() {
        if(seleccionados.length < 2) return alert("Mínimo 2 jugadores");
        
        let results = seleccionados.map(n => ({
            nombre: n,
            score: parseInt(document.getElementById(`total_${n}`).innerText)
        })).sort((a,b) => a.score - b.score);

        if(!confirm(`Ganador: ${results[0].nombre}. ¿Guardar?`)) return;

        showLoader(true);
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                accion: "guardar_juego",
                ganador: results[0].nombre,
                perdedores: results.slice(1).map(r => r.nombre),
                puntajeGanador: results[0].score
            })
        });
        seleccionados = [];
        await loadData();
    }

    function renderStats() {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: jugadores.map(j => j.nombre),
                datasets: [
                    { label: '🏆 Ganados', data: jugadores.map(j => j.ganados), backgroundColor: '#10b981' },
                    { label: '💀 Perdidos', data: jugadores.map(j => j.perdidos), backgroundColor: '#f43f5e' }
                ]
            },
            options: {
                maintainAspectRatio: false,
                scales: { 
                    y: { stacked: true, grid: { color: '#334155' } },
                    x: { stacked: true, grid: { display: false } }
                },
                plugins: { legend: { labels: { color: '#f1f5f9' } } }
            }
        });
    }

    function showLoader(show) { document.getElementById('globalLoader').style.display = show ? 'flex' : 'none'; }
</script>

<style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>

</body>
</html>
